name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          EC2_HOST: "${{ secrets.EC2_HOST }}"
          EC2_SSH_KEY: "${{ secrets.EC2_SSH_KEY }}"
          EC2_SSH_PORT: "${{ secrets.EC2_SSH_PORT }}"
        run: |
          set -euo pipefail

          : "${EC2_HOST:?EC2_HOST secret is required}"
          : "${EC2_SSH_KEY:?EC2_SSH_KEY secret is required}"

          SSH_PORT="${EC2_SSH_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/roomlog_ec2_key
          chmod 600 ~/.ssh/roomlog_ec2_key

          ssh-keyscan -p "$SSH_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Write production environment
        env:
          PROD_ENV: "${{ secrets.PROD_ENV }}"
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
          API_INTERNAL_URL: "${{ secrets.API_INTERNAL_URL }}"
          NEXT_PUBLIC_API_URL: "${{ secrets.NEXT_PUBLIC_API_URL }}"
          NEXT_PUBLIC_NAVER_MAP_CLIENT_ID: "${{ secrets.NEXT_PUBLIC_NAVER_MAP_CLIENT_ID }}"
          ROOMLOG_PUBLIC_ORIGIN: "${{ secrets.ROOMLOG_PUBLIC_ORIGIN }}"
          GOOGLE_LOGIN_CLIENT_ID: "${{ secrets.GOOGLE_LOGIN_CLIENT_ID }}"
          GOOGLE_LOGIN_CLIENT_SECRET: "${{ secrets.GOOGLE_LOGIN_CLIENT_SECRET }}"
          GOOGLE_LOGIN_CALLBACK_URL: "${{ secrets.GOOGLE_LOGIN_CALLBACK_URL }}"
          PORT: "${{ secrets.PORT }}"
          AWS_REGION: "${{ secrets.AWS_REGION }}"
          S3_BUCKET_NAME: "${{ secrets.S3_BUCKET_NAME }}"
        run: |
          set -euo pipefail

          : "${DATABASE_URL:?DATABASE_URL secret is required}"

          if [ -z "${API_INTERNAL_URL:-}" ] && [ -n "${PROD_ENV:-}" ]; then
            API_INTERNAL_URL="$(
              printf '%s\n' "$PROD_ENV" \
                | awk 'BEGIN { FS = "=" } $1 == "API_INTERNAL_URL" { sub(/^[^=]*=/, ""); print; exit }'
            )"
          fi
          API_INTERNAL_URL="${API_INTERNAL_URL:-http://api:4000}"
          NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-/api}"
          NEXT_PUBLIC_NAVER_MAP_CLIENT_ID="${NEXT_PUBLIC_NAVER_MAP_CLIENT_ID:-}"

          read_prod_env_key() {
            key="$1"
            printf '%s\n' "${PROD_ENV:-}" \
              | awk -v key="$key" 'BEGIN { FS = "=" } $1 == key { sub(/^[^=]*=/, ""); print; exit }'
          }

          if [ -z "$NEXT_PUBLIC_NAVER_MAP_CLIENT_ID" ] && [ -n "${PROD_ENV:-}" ]; then
            NEXT_PUBLIC_NAVER_MAP_CLIENT_ID="$(read_prod_env_key NEXT_PUBLIC_NAVER_MAP_CLIENT_ID)"
          fi

          ROOMLOG_PUBLIC_ORIGIN="${ROOMLOG_PUBLIC_ORIGIN:-}"
          if [ -z "$ROOMLOG_PUBLIC_ORIGIN" ] && [ -n "${PROD_ENV:-}" ]; then
            ROOMLOG_PUBLIC_ORIGIN="$(read_prod_env_key ROOMLOG_PUBLIC_ORIGIN)"
          fi
          ROOMLOG_PUBLIC_ORIGIN="${ROOMLOG_PUBLIC_ORIGIN:-https://www.woo-zu.com}"

          GOOGLE_LOGIN_CLIENT_ID="${GOOGLE_LOGIN_CLIENT_ID:-}"
          if [ -z "$GOOGLE_LOGIN_CLIENT_ID" ] && [ -n "${PROD_ENV:-}" ]; then
            GOOGLE_LOGIN_CLIENT_ID="$(read_prod_env_key GOOGLE_LOGIN_CLIENT_ID)"
          fi

          GOOGLE_LOGIN_CLIENT_SECRET="${GOOGLE_LOGIN_CLIENT_SECRET:-}"
          if [ -z "$GOOGLE_LOGIN_CLIENT_SECRET" ] && [ -n "${PROD_ENV:-}" ]; then
            GOOGLE_LOGIN_CLIENT_SECRET="$(read_prod_env_key GOOGLE_LOGIN_CLIENT_SECRET)"
          fi

          GOOGLE_LOGIN_CALLBACK_URL="${GOOGLE_LOGIN_CALLBACK_URL:-}"
          if [ -z "$GOOGLE_LOGIN_CALLBACK_URL" ] && [ -n "${PROD_ENV:-}" ]; then
            GOOGLE_LOGIN_CALLBACK_URL="$(read_prod_env_key GOOGLE_LOGIN_CALLBACK_URL)"
          fi

          PORT="${PORT:-4000}"
          AWS_REGION="${AWS_REGION:-ap-northeast-2}"
          S3_BUCKET_NAME="${S3_BUCKET_NAME:-roomlog-files}"

          if [ -n "${PROD_ENV:-}" ]; then
            printf '%s\n' "$PROD_ENV" \
              | awk 'BEGIN { FS = "=" } !/^[[:space:]]*(#|$)/ && $1 ~ /^(DATABASE_URL|API_INTERNAL_URL|NEXT_PUBLIC_API_URL|NEXT_PUBLIC_NAVER_MAP_CLIENT_ID|ROOMLOG_PUBLIC_ORIGIN|GOOGLE_LOGIN_CLIENT_ID|GOOGLE_LOGIN_CLIENT_SECRET|GOOGLE_LOGIN_CALLBACK_URL|PORT|AWS_REGION|S3_BUCKET_NAME)$/ { next } { print }' \
              > .env.production
          else
            : > .env.production
          fi

          cat >> .env.production <<EOF
          DATABASE_URL=${DATABASE_URL}
          API_INTERNAL_URL=${API_INTERNAL_URL}
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          NEXT_PUBLIC_NAVER_MAP_CLIENT_ID=${NEXT_PUBLIC_NAVER_MAP_CLIENT_ID}
          ROOMLOG_PUBLIC_ORIGIN=${ROOMLOG_PUBLIC_ORIGIN}
          GOOGLE_LOGIN_CLIENT_ID=${GOOGLE_LOGIN_CLIENT_ID}
          GOOGLE_LOGIN_CLIENT_SECRET=${GOOGLE_LOGIN_CLIENT_SECRET}
          GOOGLE_LOGIN_CALLBACK_URL=${GOOGLE_LOGIN_CALLBACK_URL}
          PORT=${PORT}
          AWS_REGION=${AWS_REGION}
          S3_BUCKET_NAME=${S3_BUCKET_NAME}
          EOF

      - name: Deploy to EC2
        env:
          EC2_HOST: "${{ secrets.EC2_HOST }}"
          EC2_USER: "${{ secrets.EC2_USER }}"
          EC2_SSH_PORT: "${{ secrets.EC2_SSH_PORT }}"
          EC2_APP_DIR: "${{ secrets.EC2_APP_DIR }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
          GITHUB_REF_NAME: "${{ github.ref_name }}"
        run: |
          set -euo pipefail

          : "${EC2_HOST:?EC2_HOST secret is required}"
          : "${EC2_USER:?EC2_USER secret is required}"

          SSH_PORT="${EC2_SSH_PORT:-22}"
          APP_DIR="${EC2_APP_DIR:-/home/ec2-user/roomlog}"
          BRANCH="${GITHUB_REF_NAME:-main}"

          scp -P "$SSH_PORT" -i ~/.ssh/roomlog_ec2_key \
            .env.production "$EC2_USER@$EC2_HOST:/tmp/roomlog.env"

          ssh -p "$SSH_PORT" -i ~/.ssh/roomlog_ec2_key \
            "$EC2_USER@$EC2_HOST" \
            "bash -se -- '$APP_DIR' '$GITHUB_REPOSITORY' '$BRANCH'" <<'REMOTE'
          set -euo pipefail

          APP_DIR="$1"
          REPOSITORY="$2"
          BRANCH="$3"

          dump_docker_state() {
            echo "== roomlog containers =="
            docker ps -a --filter "name=roomlog" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" || true
            echo "== listeners on roomlog ports =="
            (sudo ss -ltnp 2>/dev/null || ss -ltnp) | grep -E ':(3000|4000)\b' || true
          }

          on_exit() {
            status="$?"
            if [ "$status" -ne 0 ]; then
              echo "Deploy failed. Capturing Docker state for diagnosis."
              dump_docker_state
            fi
            exit "$status"
          }

          trap on_exit EXIT

          if [ ! -d "$APP_DIR/.git" ]; then
            mkdir -p "$(dirname "$APP_DIR")"
            git clone "https://github.com/$REPOSITORY.git" "$APP_DIR"
          fi

          cd "$APP_DIR"

          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

          mv /tmp/roomlog.env .env

          if docker compose version >/dev/null 2>&1; then
            compose() { docker compose "$@"; }
          elif command -v docker-compose >/dev/null 2>&1; then
            compose() { docker-compose "$@"; }
          else
            echo "Docker Compose is not installed." >&2
            exit 1
          fi

          echo "Container state before deploy:"
          dump_docker_state

          docker rm -f roomlog-web roomlog-api 2>/dev/null || true

          compose -f docker-compose.prod.yml up -d --build --remove-orphans
          docker image prune -f
          compose -f docker-compose.prod.yml ps
          REMOTE
