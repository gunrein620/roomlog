name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          EC2_HOST: "${{ secrets.EC2_HOST }}"
          EC2_SSH_KEY: "${{ secrets.EC2_SSH_KEY }}"
          EC2_SSH_PORT: "${{ secrets.EC2_SSH_PORT }}"
        run: |
          set -euo pipefail

          : "${EC2_HOST:?EC2_HOST secret is required}"
          : "${EC2_SSH_KEY:?EC2_SSH_KEY secret is required}"

          SSH_PORT="${EC2_SSH_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/roomlog_ec2_key
          chmod 600 ~/.ssh/roomlog_ec2_key

          ssh-keyscan -p "$SSH_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Write production environment
        env:
          PROD_ENV: "${{ secrets.PROD_ENV }}"
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
          API_INTERNAL_URL: "${{ secrets.API_INTERNAL_URL }}"
          NEXT_PUBLIC_API_URL: "${{ secrets.NEXT_PUBLIC_API_URL }}"
          NEXT_PUBLIC_NAVER_MAP_CLIENT_ID: "${{ secrets.NEXT_PUBLIC_NAVER_MAP_CLIENT_ID }}"
          ROOMLOG_PUBLIC_ORIGIN: "${{ secrets.ROOMLOG_PUBLIC_ORIGIN }}"
          GOOGLE_LOGIN_CLIENT_ID: "${{ secrets.GOOGLE_LOGIN_CLIENT_ID }}"
          GOOGLE_LOGIN_CLIENT_SECRET: "${{ secrets.GOOGLE_LOGIN_CLIENT_SECRET }}"
          GOOGLE_LOGIN_CALLBACK_URL: "${{ secrets.GOOGLE_LOGIN_CALLBACK_URL }}"
          KAKAO_LOGIN_REST_API_KEY: "${{ secrets.KAKAO_LOGIN_REST_API_KEY }}"
          KAKAO_LOGIN_CLIENT_SECRET: "${{ secrets.KAKAO_LOGIN_CLIENT_SECRET }}"
          KAKAO_LOGIN_CALLBACK_URL: "${{ secrets.KAKAO_LOGIN_CALLBACK_URL }}"
          PORT: "${{ secrets.PORT }}"
          AWS_REGION: "${{ secrets.AWS_REGION }}"
          S3_BUCKET_NAME: "${{ secrets.S3_BUCKET_NAME }}"
          S3_UPLOADS_ENABLED: "${{ secrets.S3_UPLOADS_ENABLED }}"
          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          CLOUDFRONT_BASE_URL: "${{ secrets.CLOUDFRONT_BASE_URL }}"
          MOLIT_SERVICE_KEY: "${{ secrets.MOLIT_SERVICE_KEY }}"
          ROBOFLOW_API_KEY: "${{ secrets.ROBOFLOW_API_KEY }}"
        run: |
          set -euo pipefail

          : "${DATABASE_URL:?DATABASE_URL secret is required}"

          if [ -z "${API_INTERNAL_URL:-}" ] && [ -n "${PROD_ENV:-}" ]; then
            API_INTERNAL_URL="$(
              printf '%s\n' "$PROD_ENV" \
                | awk 'BEGIN { FS = "=" } $1 == "API_INTERNAL_URL" { sub(/^[^=]*=/, ""); print; exit }'
            )"
          fi
          API_INTERNAL_URL="${API_INTERNAL_URL:-http://api:4000}"
          NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-/api}"
          NEXT_PUBLIC_NAVER_MAP_CLIENT_ID="${NEXT_PUBLIC_NAVER_MAP_CLIENT_ID:-}"

          read_prod_env_key() {
            key="$1"
            printf '%s\n' "${PROD_ENV:-}" \
              | awk -v key="$key" 'BEGIN { FS = "=" } $1 == key { sub(/^[^=]*=/, ""); print; exit }'
          }

          if [ -z "$NEXT_PUBLIC_NAVER_MAP_CLIENT_ID" ] && [ -n "${PROD_ENV:-}" ]; then
            NEXT_PUBLIC_NAVER_MAP_CLIENT_ID="$(read_prod_env_key NEXT_PUBLIC_NAVER_MAP_CLIENT_ID)"
          fi

          ROOMLOG_PUBLIC_ORIGIN="${ROOMLOG_PUBLIC_ORIGIN:-}"
          if [ -z "$ROOMLOG_PUBLIC_ORIGIN" ] && [ -n "${PROD_ENV:-}" ]; then
            ROOMLOG_PUBLIC_ORIGIN="$(read_prod_env_key ROOMLOG_PUBLIC_ORIGIN)"
          fi
          ROOMLOG_PUBLIC_ORIGIN="${ROOMLOG_PUBLIC_ORIGIN:-https://www.woo-zu.com}"

          GOOGLE_LOGIN_CLIENT_ID="${GOOGLE_LOGIN_CLIENT_ID:-}"
          if [ -z "$GOOGLE_LOGIN_CLIENT_ID" ] && [ -n "${PROD_ENV:-}" ]; then
            GOOGLE_LOGIN_CLIENT_ID="$(read_prod_env_key GOOGLE_LOGIN_CLIENT_ID)"
          fi

          GOOGLE_LOGIN_CLIENT_SECRET="${GOOGLE_LOGIN_CLIENT_SECRET:-}"
          if [ -z "$GOOGLE_LOGIN_CLIENT_SECRET" ] && [ -n "${PROD_ENV:-}" ]; then
            GOOGLE_LOGIN_CLIENT_SECRET="$(read_prod_env_key GOOGLE_LOGIN_CLIENT_SECRET)"
          fi

          GOOGLE_LOGIN_CALLBACK_URL="${GOOGLE_LOGIN_CALLBACK_URL:-}"
          if [ -z "$GOOGLE_LOGIN_CALLBACK_URL" ] && [ -n "${PROD_ENV:-}" ]; then
            GOOGLE_LOGIN_CALLBACK_URL="$(read_prod_env_key GOOGLE_LOGIN_CALLBACK_URL)"
          fi

          # 카카오 로그인 — 개별 secret 우선, 없으면 PROD_ENV에서 읽는다(구글과 동일한 패턴).
          KAKAO_LOGIN_REST_API_KEY="${KAKAO_LOGIN_REST_API_KEY:-}"
          if [ -z "$KAKAO_LOGIN_REST_API_KEY" ] && [ -n "${PROD_ENV:-}" ]; then
            KAKAO_LOGIN_REST_API_KEY="$(read_prod_env_key KAKAO_LOGIN_REST_API_KEY)"
          fi

          KAKAO_LOGIN_CLIENT_SECRET="${KAKAO_LOGIN_CLIENT_SECRET:-}"
          if [ -z "$KAKAO_LOGIN_CLIENT_SECRET" ] && [ -n "${PROD_ENV:-}" ]; then
            KAKAO_LOGIN_CLIENT_SECRET="$(read_prod_env_key KAKAO_LOGIN_CLIENT_SECRET)"
          fi

          KAKAO_LOGIN_CALLBACK_URL="${KAKAO_LOGIN_CALLBACK_URL:-}"
          if [ -z "$KAKAO_LOGIN_CALLBACK_URL" ] && [ -n "${PROD_ENV:-}" ]; then
            KAKAO_LOGIN_CALLBACK_URL="$(read_prod_env_key KAKAO_LOGIN_CALLBACK_URL)"
          fi

          # 웹소켓 접속 주소 — PROD_ENV로 덮어쓸 수 있고, 기본은 api 서브도메인(ALB 호스트 규칙).
          NEXT_PUBLIC_SOCKET_URL="${NEXT_PUBLIC_SOCKET_URL:-}"
          if [ -z "$NEXT_PUBLIC_SOCKET_URL" ] && [ -n "${PROD_ENV:-}" ]; then
            NEXT_PUBLIC_SOCKET_URL="$(read_prod_env_key NEXT_PUBLIC_SOCKET_URL)"
          fi
          NEXT_PUBLIC_SOCKET_URL="${NEXT_PUBLIC_SOCKET_URL:-https://api.woo-zu.com}"

          PORT="${PORT:-4000}"
          AWS_REGION="${AWS_REGION:-ap-northeast-2}"
          S3_BUCKET_NAME="${S3_BUCKET_NAME:-roomlog-files}"

          # 앱 API 키 — 개별 secret 우선, 없으면 PROD_ENV에서 읽는다.
          MOLIT_SERVICE_KEY="${MOLIT_SERVICE_KEY:-}"
          if [ -z "$MOLIT_SERVICE_KEY" ] && [ -n "${PROD_ENV:-}" ]; then
            MOLIT_SERVICE_KEY="$(read_prod_env_key MOLIT_SERVICE_KEY)"
          fi

          ROBOFLOW_API_KEY="${ROBOFLOW_API_KEY:-}"
          if [ -z "$ROBOFLOW_API_KEY" ] && [ -n "${PROD_ENV:-}" ]; then
            ROBOFLOW_API_KEY="$(read_prod_env_key ROBOFLOW_API_KEY)"
          fi

          # S3 업로드 전환 — secret이 채워진 경우에만 켠다(없으면 로컬 디스크 폴백 유지).
          S3_UPLOADS_ENABLED="${S3_UPLOADS_ENABLED:-}"
          if [ -z "$S3_UPLOADS_ENABLED" ] && [ -n "${PROD_ENV:-}" ]; then
            S3_UPLOADS_ENABLED="$(read_prod_env_key S3_UPLOADS_ENABLED)"
          fi

          AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID:-}"
          if [ -z "$AWS_ACCESS_KEY_ID" ] && [ -n "${PROD_ENV:-}" ]; then
            AWS_ACCESS_KEY_ID="$(read_prod_env_key AWS_ACCESS_KEY_ID)"
          fi

          AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY:-}"
          if [ -z "$AWS_SECRET_ACCESS_KEY" ] && [ -n "${PROD_ENV:-}" ]; then
            AWS_SECRET_ACCESS_KEY="$(read_prod_env_key AWS_SECRET_ACCESS_KEY)"
          fi

          CLOUDFRONT_BASE_URL="${CLOUDFRONT_BASE_URL:-}"
          if [ -z "$CLOUDFRONT_BASE_URL" ] && [ -n "${PROD_ENV:-}" ]; then
            CLOUDFRONT_BASE_URL="$(read_prod_env_key CLOUDFRONT_BASE_URL)"
          fi

          if [ -n "${PROD_ENV:-}" ]; then
            printf '%s\n' "$PROD_ENV" \
              | awk 'BEGIN { FS = "=" } !/^[[:space:]]*(#|$)/ && $1 ~ /^(DATABASE_URL|API_INTERNAL_URL|NEXT_PUBLIC_API_URL|NEXT_PUBLIC_NAVER_MAP_CLIENT_ID|NEXT_PUBLIC_SOCKET_URL|ROOMLOG_PUBLIC_ORIGIN|GOOGLE_LOGIN_CLIENT_ID|GOOGLE_LOGIN_CLIENT_SECRET|GOOGLE_LOGIN_CALLBACK_URL|KAKAO_LOGIN_REST_API_KEY|KAKAO_LOGIN_CLIENT_SECRET|KAKAO_LOGIN_CALLBACK_URL|PORT|AWS_REGION|S3_BUCKET_NAME|S3_UPLOADS_ENABLED|AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|CLOUDFRONT_BASE_URL|MOLIT_SERVICE_KEY|ROBOFLOW_API_KEY)$/ { next } { print }' \
              > .env.production
          else
            : > .env.production
          fi

          cat >> .env.production <<EOF
          DATABASE_URL=${DATABASE_URL}
          API_INTERNAL_URL=${API_INTERNAL_URL}
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          NEXT_PUBLIC_NAVER_MAP_CLIENT_ID=${NEXT_PUBLIC_NAVER_MAP_CLIENT_ID}
          NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
          ROOMLOG_PUBLIC_ORIGIN=${ROOMLOG_PUBLIC_ORIGIN}
          GOOGLE_LOGIN_CLIENT_ID=${GOOGLE_LOGIN_CLIENT_ID}
          GOOGLE_LOGIN_CLIENT_SECRET=${GOOGLE_LOGIN_CLIENT_SECRET}
          GOOGLE_LOGIN_CALLBACK_URL=${GOOGLE_LOGIN_CALLBACK_URL}
          PORT=${PORT}
          AWS_REGION=${AWS_REGION}
          S3_BUCKET_NAME=${S3_BUCKET_NAME}
          EOF

          # 값이 있을 때만 기록 — secret 미등록 상태에서 빈 값으로 덮지 않는다.
          if [ -n "$KAKAO_LOGIN_REST_API_KEY" ]; then
            echo "KAKAO_LOGIN_REST_API_KEY=${KAKAO_LOGIN_REST_API_KEY}" >> .env.production
          fi
          if [ -n "$KAKAO_LOGIN_CLIENT_SECRET" ]; then
            echo "KAKAO_LOGIN_CLIENT_SECRET=${KAKAO_LOGIN_CLIENT_SECRET}" >> .env.production
          fi
          if [ -n "$KAKAO_LOGIN_CALLBACK_URL" ]; then
            echo "KAKAO_LOGIN_CALLBACK_URL=${KAKAO_LOGIN_CALLBACK_URL}" >> .env.production
          fi
          if [ -n "$MOLIT_SERVICE_KEY" ]; then
            echo "MOLIT_SERVICE_KEY=${MOLIT_SERVICE_KEY}" >> .env.production
          fi
          if [ -n "$ROBOFLOW_API_KEY" ]; then
            echo "ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY}" >> .env.production
          fi
          if [ -n "$S3_UPLOADS_ENABLED" ]; then
            echo "S3_UPLOADS_ENABLED=${S3_UPLOADS_ENABLED}" >> .env.production
          fi
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> .env.production
          fi
          if [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> .env.production
          fi
          if [ -n "$CLOUDFRONT_BASE_URL" ]; then
            echo "CLOUDFRONT_BASE_URL=${CLOUDFRONT_BASE_URL}" >> .env.production
          fi

      - name: Deploy to EC2
        env:
          EC2_HOST: "${{ secrets.EC2_HOST }}"
          EC2_USER: "${{ secrets.EC2_USER }}"
          EC2_SSH_PORT: "${{ secrets.EC2_SSH_PORT }}"
          EC2_APP_DIR: "${{ secrets.EC2_APP_DIR }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
          GITHUB_REF_NAME: "${{ github.ref_name }}"
        run: |
          set -euo pipefail

          : "${EC2_HOST:?EC2_HOST secret is required}"
          : "${EC2_USER:?EC2_USER secret is required}"

          SSH_PORT="${EC2_SSH_PORT:-22}"
          APP_DIR="${EC2_APP_DIR:-/home/ec2-user/roomlog}"
          BRANCH="${GITHUB_REF_NAME:-main}"

          scp -P "$SSH_PORT" -i ~/.ssh/roomlog_ec2_key \
            .env.production "$EC2_USER@$EC2_HOST:/tmp/roomlog.env"

          ssh -p "$SSH_PORT" -i ~/.ssh/roomlog_ec2_key \
            "$EC2_USER@$EC2_HOST" \
            "bash -se -- '$APP_DIR' '$GITHUB_REPOSITORY' '$BRANCH'" <<'REMOTE'
          set -euo pipefail

          APP_DIR="$1"
          REPOSITORY="$2"
          BRANCH="$3"

          dump_docker_state() {
            echo "== roomlog containers =="
            docker ps -a --filter "name=roomlog" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" || true
            echo "== listeners on roomlog ports =="
            (sudo ss -ltnp 2>/dev/null || ss -ltnp) | grep -E ':(3000|4000)\b' || true
          }

          on_exit() {
            status="$?"
            if [ "$status" -ne 0 ]; then
              echo "Deploy failed. Capturing Docker state for diagnosis."
              dump_docker_state
            fi
            exit "$status"
          }

          trap on_exit EXIT

          if [ ! -d "$APP_DIR/.git" ]; then
            mkdir -p "$(dirname "$APP_DIR")"
            git clone "https://github.com/$REPOSITORY.git" "$APP_DIR"
          fi

          cd "$APP_DIR"

          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

          mv /tmp/roomlog.env .env

          if docker compose version >/dev/null 2>&1; then
            compose() { docker compose "$@"; }
          elif command -v docker-compose >/dev/null 2>&1; then
            compose() { docker-compose "$@"; }
          else
            echo "Docker Compose is not installed." >&2
            exit 1
          fi

          echo "Container state before deploy:"
          dump_docker_state

          docker rm -f roomlog-web roomlog-api 2>/dev/null || true

          compose -f docker-compose.prod.yml up -d --build --remove-orphans
          docker image prune -f
          compose -f docker-compose.prod.yml ps
          REMOTE
