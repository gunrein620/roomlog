services:
  tenant:
    build:
      context: .
      dockerfile: apps/tenant/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: roomlog-tenant
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      - api
    ports:
      - "3001:3001"

  manager:
    build:
      context: .
      dockerfile: apps/manager/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: roomlog-manager
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      - api
    ports:
      - "3002:3002"

  vendor:
    build:
      context: .
      dockerfile: apps/vendor/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: roomlog-vendor
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      - api
    ports:
      - "3003:3003"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: roomlog-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required for production}
      ROOMLOG_STORE_FILE: ${ROOMLOG_STORE_FILE:-/data/roomlog-store.json}
      LOCAL_UPLOAD_DIR: ${LOCAL_UPLOAD_DIR:-/data/uploads}
      PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-/api/files}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-roomlog-files}
    ports:
      - "4000:4000"
    volumes:
      - roomlog-api-data:/data

volumes:
  roomlog-api-data:
