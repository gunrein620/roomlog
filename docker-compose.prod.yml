services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_NAVER_MAP_CLIENT_ID: ${NEXT_PUBLIC_NAVER_MAP_CLIENT_ID:-}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-https://api.woo-zu.com}
    container_name: roomlog-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_NAVER_MAP_CLIENT_ID: ${NEXT_PUBLIC_NAVER_MAP_CLIENT_ID:-}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-https://api.woo-zu.com}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
      ROOMLOG_PUBLIC_ORIGIN: ${ROOMLOG_PUBLIC_ORIGIN:-https://www.woo-zu.com}
      GOOGLE_LOGIN_CLIENT_ID: ${GOOGLE_LOGIN_CLIENT_ID:-}
      GOOGLE_LOGIN_CALLBACK_URL: ${GOOGLE_LOGIN_CALLBACK_URL:-}
    depends_on:
      - api
    ports:
      - "3000:3000"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: roomlog-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required for production}
      ROOMLOG_STORE_FILE: ${ROOMLOG_STORE_FILE:-/data/roomlog-store.json}
      LOCAL_UPLOAD_DIR: ${LOCAL_UPLOAD_DIR:-/data/uploads}
      # 브라우저는 www.woo-zu.com에서 이미지를 받는데, /api/files는 api 호스트로 라우팅되므로 절대주소로 준다.
      # (버킷 준비 후 S3_UPLOADS_ENABLED=true를 켜면 이 값은 무시되고 CloudFront URL이 쓰인다.)
      PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-https://api.woo-zu.com/api/files}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-roomlog-files}
      # 버킷 생성 후 아래 두 값만 채우면(=true, CloudFront URL) 코드 변경 없이 S3 저장으로 전환된다.
      S3_UPLOADS_ENABLED: ${S3_UPLOADS_ENABLED:-}
      CLOUDFRONT_BASE_URL: ${CLOUDFRONT_BASE_URL:-}
      # GPU 재구성 오케스트레이터 — 전부 채워져야 활성(하나라도 비면 자동 비활성, apps/api/src/reconstruction/).
      GPU_PIPELINE_ENABLED: ${GPU_PIPELINE_ENABLED:-}
      GPU_INSTANCE_ID: ${GPU_INSTANCE_ID:-}
      # GPU 박스는 us-east-1 — 스토리지 리전(ap-northeast-2)과 다르므로 반드시 별도 값.
      GPU_REGION: ${GPU_REGION:-}
      GPU_WORKER_SECRET: ${GPU_WORKER_SECRET:-}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-https://api.woo-zu.com}
    ports:
      - "4000:4000"
    volumes:
      - roomlog-api-data:/data

volumes:
  roomlog-api-data:
