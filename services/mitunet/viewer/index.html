<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>MitUNet Floorplan to 3D</title>
<style>
  @font-face {
    font-family: "NanumSquareRound";
    src: url(https://hangeul.pstatic.net/hangeul_static/webfont/NanumSquareRound/NanumSquareRoundR.woff2) format("woff2");
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: "NanumSquareRound";
    src: url(https://hangeul.pstatic.net/hangeul_static/webfont/NanumSquareRound/NanumSquareRoundB.woff2) format("woff2");
    font-weight: 700;
    font-display: swap;
  }
  @font-face {
    font-family: "NanumSquareRound";
    src: url(https://hangeul.pstatic.net/hangeul_static/webfont/NanumSquareRound/NanumSquareRoundEB.woff2) format("woff2");
    font-weight: 800;
    font-display: swap;
  }
  :root {
    --surface: #f1eef9;
    --surface-dim: #e8e3f3;
    --surface-container-lowest: #ffffff;
    --surface-low: #f5f2fb;
    --surface-container: #efebf8;
    --card: #ffffff;
    --on-surface: #211c33;
    --on-surface-variant: #6b6584;
    --primary: #5747cf;
    --primary-hover: #4a3bc0;
    --primary-container: #e9e5ff;
    --on-primary-container: #3a2ba8;
    --chip-bg: #f0edf9;
    --chip-on: #4c4570;
    --pastel-blue: #e1e6fb;
    --on-pastel-blue: #3a4894;
    --pastel-yellow: #f7ebc4;
    --on-pastel-yellow: #6d581a;
    --pastel-pink: #fadeee;
    --on-pastel-pink: #963f6d;
    --pastel-mint: #daefe6;
    --on-pastel-mint: #1f6a52;
    --pastel-lilac: #e9e2fa;
    --on-pastel-lilac: #4f3d9e;
    --pastel-peach: #f9e0d3;
    --on-pastel-peach: #86432a;
    --nav-surface: #201a3f;
    --nav-on: #f4f1fd;
    --nav-grad: linear-gradient(135deg, #292153, #1e1840);
    --nav-border: rgba(160, 146, 255, 0.22);
    --input-border: #e6e1f2;
    --input-placeholder: #9a93b6;
    --success: #1d7a55;
    --danger: #b42318;
    --warning: #a15c00;
    --shadow: 0 24px 56px rgba(35, 27, 74, .09);
    --shadow-soft: 0 14px 36px rgba(35, 27, 74, .05);
    --radius-sm: 10px;
    --radius: 14px;
    --radius-md: 20px;
    --radius-btn: 16px;
    --bg: var(--surface);
    --floor: var(--surface-container);
    --ink: var(--on-surface);
    --muted: var(--on-surface-variant);
    --hairline: var(--input-border);
    --panel-width: 336px;
    --wall: var(--on-pastel-blue);
    --door: var(--on-pastel-yellow);
    --window: var(--on-pastel-pink);
    --accent: var(--primary);
    --accent-hover: var(--primary-hover);
    --accent-tint: rgba(87, 71, 207, .16);
    --view-fade-ms: 220ms;
    --font-sans: "NanumSquareRound", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
  }
  canvas#scene,
  #review-canvas {
    display: block;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--view-fade-ms) ease;
  }
  canvas[hidden], [hidden] { display: none !important; }
  /* Sky lives in CSS, not in the WebGL scene: a scene.background
     texture pollutes GTAOPass's depth/normal passes (black-slab artifact), so
     the canvas is transparent and this sky shows through from behind.
     Starry night: tiled radial-gradient star layers (differing tile sizes give a
     pseudo-random scatter) over a deep-navy gradient with a soft horizon glow.
     Keep the fog color (COLOR_BG) in step with the mid-to-lower stops. */
  canvas#scene {
    background:
      linear-gradient(to top, rgba(4, 15, 13, .92) 0, rgba(5, 19, 18, .62) 8%, transparent 22%),
      radial-gradient(1.5px 1.5px at 18px 32px, rgba(255,255,255,0.98), transparent 70%),
      radial-gradient(1.1px 1.1px at 121px 74px, rgba(255,255,255,0.8), transparent 70%),
      radial-gradient(1.3px 1.3px at 67px 141px, rgba(214,226,255,0.92), transparent 70%),
      radial-gradient(1.1px 1.1px at 203px 109px, rgba(255,255,255,0.66), transparent 70%),
      radial-gradient(1.4px 1.4px at 90px 200px, rgba(255,246,232,0.85), transparent 70%),
      radial-gradient(0.9px 0.9px at 250px 40px, rgba(255,255,255,0.7), transparent 70%),
      radial-gradient(1.1px 1.1px at 40px 260px, rgba(210,224,255,0.74), transparent 70%),
      radial-gradient(1px 1px at 300px 180px, rgba(255,255,255,0.74), transparent 70%),
      radial-gradient(1.2px 1.2px at 160px 300px, rgba(255,255,255,0.82), transparent 70%),
      radial-gradient(0.8px 0.8px at 210px 230px, rgba(255,255,255,0.6), transparent 70%),
      radial-gradient(2.5px 2.5px at 331px 87px, rgba(255,255,255,1), rgba(255,255,255,0.3) 45%, transparent 72%),
      radial-gradient(2.1px 2.1px at 120px 360px, rgba(224,236,255,1), rgba(224,236,255,0.28) 45%, transparent 72%),
      linear-gradient(#04060f, #101a38 55%, #26355e);
    background-size: 100% 100%, 160px 160px, 200px 200px, 240px 240px, 280px 280px, 300px 300px, 170px 170px, 220px 220px, 190px 190px, 260px 260px, 150px 150px, 520px 520px, 560px 560px, 100% 100%;
    background-repeat: no-repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, no-repeat;
  }
  #workspace-empty-backdrop {
    position: fixed;
    inset: 0;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    background-image:
      linear-gradient(180deg, rgba(1, 5, 15, .08), rgba(1, 7, 16, .18)),
      url("/viewer-assets/assets/cosmic-night-landscape.png");
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    transition: opacity 220ms ease;
  }
  body.upload-empty #workspace-empty-backdrop { opacity: 1; }
  #review-canvas {
    background: var(--surface-dim);
  }
  body.view-3d canvas#scene,
  body.view-original #review-canvas { opacity: 1; pointer-events: auto; }
  body.view-transitioning canvas#scene,
  body.view-transitioning #review-canvas,
  body.is-busy canvas#scene,
  body.is-busy #review-canvas { pointer-events: none; }

  #control-stack {
    position: fixed;
    top: 16px;
    bottom: 16px;
    left: 16px;
    z-index: 10;
    width: var(--panel-width);
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  #ui,
  #editor-tools {
    background: rgba(255, 255, 255, .92);
    backdrop-filter: blur(22px) saturate(120%);
    -webkit-backdrop-filter: blur(22px) saturate(120%);
    border: 0;
    border-radius: var(--radius-md);
    padding: 20px;
    box-shadow: var(--shadow);
    pointer-events: auto;
  }
  #ui { flex: 0 0 auto; }
  #editor-tools {
    flex: 0 1 auto;
    min-height: 0;
    overflow-y: auto;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-6px);
    pointer-events: none;
    transition:
      opacity 180ms ease,
      transform 180ms ease,
      visibility 0s linear 180ms;
  }
  body.view-original #editor-tools {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    pointer-events: auto;
    transition-delay: 0s;
  }
  body.view-transitioning #editor-tools,
  body.is-busy #editor-tools {
    pointer-events: none;
  }
  h1 {
    margin: 0 0 16px;
    font-size: 18px; font-weight: 800;
    letter-spacing: -.02em;
  }
  .label {
    font-size: 10px; font-weight: 800;
    color: var(--primary);
    margin: 16px 0 7px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .label:first-of-type { margin-top: 0; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; }
  .btn {
    font: inherit; font-size: 12px; font-weight: 700;
    min-height: 38px;
    padding: 8px 12px;
    background: var(--primary-container);
    border: 0;
    border-radius: var(--radius-btn);
    cursor: pointer;
    color: var(--on-primary-container);
    transition: background .18s ease, color .18s ease, box-shadow .18s ease, transform .12s ease;
  }
  .btn:hover { background: #ddd6ff; box-shadow: var(--shadow-soft); }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--primary); color: #fff; border: 0; box-shadow: 0 8px 20px rgba(87, 71, 207, .32); }
  .btn.primary:hover { background: var(--primary-hover); box-shadow: 0 10px 24px rgba(87, 71, 207, .38); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn:focus-visible,
  .segment:focus-visible,
  .camera-preset:focus-visible,
  .furniture-category-chip:focus-visible { outline: 3px solid rgba(87, 71, 207, .3); outline-offset: 2px; }
  .btn svg, .btn [data-lucide] { width: 15px; height: 15px; flex: 0 0 15px; }
  .btn.with-icon { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }

  .segmented {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    padding: 4px;
    border: 0;
    border-radius: 999px;
    background: var(--surface-container);
  }
  .segment {
    min-width: 0;
    min-height: 36px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: var(--on-surface-variant);
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .segment.active { background: var(--card); color: var(--primary); box-shadow: var(--shadow-soft); }
  .segment:disabled { opacity: 0.4; cursor: default; }

  .camera-preset-row {
    display: flex;
    gap: 8px;
    margin: 0 -2px;
    padding: 0 2px 5px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .camera-preset {
    flex: 0 0 auto;
    min-height: 34px;
    padding: 7px 11px;
    border: 0;
    border-radius: 999px;
    background: var(--chip-bg);
    color: var(--chip-on);
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background .18s ease, color .18s ease, box-shadow .18s ease;
  }
  .camera-preset:hover { background: var(--primary-container); color: var(--on-primary-container); }
  .camera-preset.active { border: 0; background: var(--primary); color: #fff; box-shadow: 0 8px 20px rgba(87, 71, 207, .22); }
  .camera-preset:disabled { opacity: 0.4; cursor: default; }

  .tool-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
  }
  .tool-grid .btn { width: 100%; min-width: 0; }
  .tool-grid .btn.active { border: 0; background: var(--primary); color: #fff; box-shadow: 0 8px 20px rgba(87, 71, 207, .22); }
  .action-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
  .action-grid .btn { width: 100%; min-width: 0; }
  .navigation-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
  .navigation-grid .btn { width: 100%; min-width: 0; }

  .sample-select {
    width: 100%;
    min-height: 36px;
    padding: 7px 30px 7px 10px;
    border: 1px solid var(--input-border);
    border-radius: var(--radius);
    background: var(--surface-low);
    color: var(--ink);
    font: inherit;
    font-size: 12px;
  }
  .sample-select:focus-visible {
    outline: 0;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(87, 71, 207, .16);
  }

  .brush-control { display: grid; grid-template-columns: auto minmax(0, 1fr) 30px; gap: 8px; align-items: center; }
  .brush-control label, .brush-value { font-size: 11px; color: var(--muted); }
  .brush-control input { width: 100%; accent-color: var(--primary); }
  .brush-value { text-align: right; font-variant-numeric: tabular-nums; }

  .scale-control {
    display: grid;
    gap: 7px;
    margin-top: 8px;
  }
  .scale-summary {
    min-height: 16px;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.45;
  }
  .scale-input-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto auto;
    gap: 6px;
    align-items: center;
  }
  .scale-input-row input {
    width: 100%;
    min-width: 0;
    height: 36px;
    padding: 7px 9px;
    border: 1px solid var(--input-border);
    border-radius: var(--radius);
    background: var(--surface-low);
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .scale-input-row input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(87, 71, 207, .16);
  }
  .scale-unit { color: var(--muted); font-size: 11px; }
  #clear-scale-btn { width: 36px; padding: 7px; }

  .legend { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
  .legend-row {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 11px 8px 9px;
    border: 0;
    border-radius: var(--radius);
    background: var(--surface-container);
    cursor: pointer;
    transition: opacity .18s ease, box-shadow .18s ease, transform .18s ease;
  }
  .legend-row:hover { box-shadow: var(--shadow-soft); transform: translateY(-1px); }
  .legend-row:has([data-visibility="wall"]) { background: var(--pastel-blue); }
  .legend-row:has([data-visibility="door"]) { background: var(--pastel-yellow); }
  .legend-row:has([data-visibility="window"]) { background: var(--pastel-pink); }
  .legend-row:has(input:not(:checked)) { opacity: 0.42; }
  .legend-row input {
    position: absolute; top: 6px; right: 6px;
    margin: 0; width: 13px; height: 13px;
    accent-color: var(--primary);
  }
  .legend-row > span:nth-of-type(2) {
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
    font-size: 9px;
    color: var(--on-surface-variant);
  }
  .swatch { width: 12px; height: 12px; border-radius: 999px; }
  .swatch.wall { background: var(--wall); }
  .swatch.door { background: var(--door); }
  .swatch.window { background: var(--window); }
  .count {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .count[data-count="wall"] { color: var(--wall); }
  .count[data-count="door"] { color: var(--door); }
  .count[data-count="window"] { color: var(--window); }

  #status {
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
    min-height: 14px;
    font-variant-numeric: tabular-nums;
  }
  #status.error { color: var(--danger); }
  #status.warning { color: var(--warning); }

  #stage-controls {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  #stage-controls .btn { width: 100%; }

  #furniture-panel {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 12;
    width: min(var(--panel-width), calc(100vw - 32px));
    max-height: calc(100vh - 32px);
    padding: 20px;
    overflow: hidden;
    border: 0;
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, .92);
    box-shadow: var(--shadow);
    backdrop-filter: blur(22px) saturate(120%);
    -webkit-backdrop-filter: blur(22px) saturate(120%);
    pointer-events: none;
  }
  body.view-furnishing #furniture-panel { pointer-events: auto; }
  .furniture-panel-title {
    margin: 0 0 14px;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -.02em;
  }
  .furniture-search-wrap { position: relative; }
  .furniture-search-wrap svg,
  .furniture-search-wrap [data-lucide] {
    position: absolute;
    top: 50%;
    left: 11px;
    width: 15px;
    height: 15px;
    color: var(--muted);
    transform: translateY(-50%);
    pointer-events: none;
  }
  #furniture-search {
    width: 100%;
    min-height: 36px;
    padding: 7px 10px 7px 34px;
    border: 1px solid var(--input-border);
    border-radius: var(--radius);
    outline: none;
    background: var(--surface-low);
    color: var(--ink);
    font: inherit;
    font-size: 12px;
  }
  #furniture-search:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(87, 71, 207, .16);
  }
  .furniture-category-chips {
    display: flex;
    gap: 8px;
    margin: 10px -2px;
    padding: 0 2px 5px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .furniture-category-chip {
    flex: 0 0 auto;
    min-height: 32px;
    padding: 6px 11px;
    border: 0;
    border-radius: 999px;
    background: var(--chip-bg);
    color: var(--chip-on);
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background .18s ease, color .18s ease, box-shadow .18s ease;
  }
  .furniture-category-chip:hover { background: var(--primary-container); color: var(--on-primary-container); }
  .furniture-category-chip.active {
    border: 0;
    background: var(--primary);
    color: #fff;
    box-shadow: 0 8px 20px rgba(87, 71, 207, .22);
  }
  #furniture-results {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 6px;
    max-height: min(58vh, 620px);
    margin: 0 -3px 10px 0;
    padding-right: 4px;
    overflow-y: auto;
    scrollbar-width: thin;
  }
  .furniture-card {
    display: grid;
    grid-template-columns: 28px minmax(0, 1fr);
    gap: 10px;
    align-items: center;
    min-height: 60px;
    padding: 9px;
    overflow-wrap: anywhere;
    border: 0;
    border-radius: var(--radius);
    background: var(--surface-low);
    color: var(--ink);
    text-align: left;
    cursor: pointer;
    transition: background .18s ease, box-shadow .18s ease, transform .18s ease;
  }
  .furniture-card:hover {
    background: var(--card);
    box-shadow: var(--shadow-soft);
    transform: translateY(-1px);
  }
  .furniture-card-swatch {
    flex: 0 0 auto;
    width: 28px;
    height: 28px;
    overflow: hidden;
    border-radius: var(--radius-sm);
    background: var(--floor);
    border: 0;
  }
  .furniture-card-swatch img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }
  .furniture-card-name {
    display: block;
    margin-bottom: 2px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.25;
  }
  .furniture-card-meta,
  .furniture-card-size {
    display: block;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    line-height: 1.35;
  }
  .furniture-empty {
    padding: 28px 12px;
    color: var(--muted);
    font-size: 11px;
    text-align: center;
  }
  #furniture-pagination {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    gap: 6px;
    align-items: center;
    margin-top: 2px;
  }
  #furniture-page-summary {
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  #furniture-reset-btn { width: 100%; margin-top: 8px; }
  #furniture-floating-toolbar {
    position: fixed;
    z-index: 30;
    visibility: hidden;
    padding: 6px;
    border: 0;
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, .96);
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
  }
  #furniture-selection-toolbar-actions,
  #furniture-pending-toolbar-actions {
    display: flex;
    gap: 6px;
  }
  .furniture-toolbar-button {
    display: inline-grid;
    width: 42px;
    height: 42px;
    place-items: center;
    padding: 0;
    border: 0;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--on-surface);
    cursor: pointer;
  }
  .furniture-toolbar-button:hover { background: var(--primary-container); color: var(--on-primary-container); }
  .furniture-toolbar-button:focus-visible { outline: 3px solid rgba(87, 71, 207, .3); outline-offset: 2px; }
  .furniture-toolbar-button:disabled { opacity: 0.38; cursor: not-allowed; }
  .furniture-toolbar-button svg { width: 20px; height: 20px; }
  .furniture-toolbar-button.danger,
  .furniture-toolbar-button.cancel { color: var(--danger); }
  .furniture-toolbar-button.confirm { color: var(--success); }
  .furniture-toolbar-button.cancel:hover { background: #fce8e7; }
  .furniture-toolbar-button.confirm:hover:not(:disabled) { background: var(--pastel-mint); }

  /* Drop overlay — appears when dragging a file onto the page. */
  body.dragging::after {
    content: "PNG 또는 JPG를 여기에 놓으세요";
    position: fixed; inset: 16px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(32, 26, 63, .86);
    backdrop-filter: blur(18px);
    border: 2px dashed var(--nav-border);
    border-radius: var(--radius-md);
    font-size: 22px; font-weight: 700;
    color: var(--nav-on);

import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";
import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { GTAOPass } from "three/addons/postprocessing/GTAOPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
import {
  buildPlanExport,
  downloadPlanJson,
  planExportFilename,
} from "/viewer-assets/plan-export.mjs";
import {
  readRoomLogContext,
  sendRoomLogCompletion,
} from "/viewer-assets/roomlog-integration.mjs";
import {
  buildFloorFinishRgba,
  buildInteriorMask,
  maskContains,
  worldToMaskPixel,
} from "/viewer-assets/floor-finishes.mjs";
import { buildRoomFloorMaterialMap } from "/viewer-assets/room-floor-zones.mjs";
import {
  FURNITURE_MANIFEST_URL,
  cloneFurniturePlacements,
  createFurniturePlacement,
  filterFurnitureCatalog,
  normalizeFurnitureCatalog,
  positionFurnitureToolbar,
  resolveFurnitureToolbarMode,
  shouldUpdateFurniturePreview,
} from "/viewer-assets/furniture-placement.mjs";
import { applyRiseAnimationFrame, replayRiseAnimations, waveDelayMs } from "/viewer-assets/view-transition.mjs";
import {
  FIXED_CAMERA_VIEWS,
  cameraPresetPosition,
} from "/viewer-assets/camera-view-presets.mjs";

// -----------------------------------------------------------------------------
// Constants — physical dimensions are in arbitrary world units. We rescale each
// plan so its longest axis spans TARGET_PLAN_SIZE units; everything else is
// measured proportionally so a small plan and a large plan look the same size.
// -----------------------------------------------------------------------------
const TARGET_PLAN_SIZE = 8.0;
// Exterior lawn margin as a fraction of the building's longest side, added on
// every edge. The ground plane is resized per plan to building + this margin so
// the yard reads as a bounded lot instead of sprawling to the horizon. Tune this
// one number to grow/shrink the grass border (0 = flush to the walls).
const GROUND_LAWN_MARGIN = 0.6;
const WALL_HEIGHT      = 0.55;
const WINDOW_SILL      = 0.16;       // bottom of glass
const WINDOW_TOP       = 0.45;       // top of glass
const PHYSICAL_WALL_HEIGHT = 2.7;
const PHYSICAL_WINDOW_SILL = 0.9;
const PHYSICAL_WINDOW_TOP = 2.1;
const RISE_DURATION_MS = 1600;
const CAMERA_TWEEN_MS = 600;
const CAMERA_PRESET_TWEEN_MS = 700;
const VIEW_FADE_MS     = 220;
const EDGE_ANGLE_DEG   = 14;          // smaller -> more crease lines
const FURNITURE_PAGE_SIZE = 60;

const FURNITURE_CATEGORY_LABELS = {
  appliance: "가전",
  bathroom: "욕실",
  bed: "침대",
  chair: "의자",
  decor: "소품",
  "desk-table": "책상·테이블",
  kitchen: "주방",
  lighting: "조명",
  sofa: "소파",
  storage: "수납",
};

// Palette
const COLOR_BG     = 0x1b284b;  // night-sky fog: sits between the CSS sky's 55% (#101a38) and horizon (#26355e) stops
// Dark night-lawn base: under the night sky the yard stays fairly dim (~74
// luminance) so it doesn't glow brighter than the moonlit scene, while still
// sitting clearly below the ~175 white walls. A deep, slightly cool green reads
// as grass "outside" without the daytime brightness.
// (Name kept as COLOR_CONCRETE to avoid touching spec-checked identifiers.)
const COLOR_CONCRETE = 0x3d5433;
const COLOR_WHITE  = 0xffffff;
const COLOR_GLASS  = 0xdbe6ec;
const COLOR_INK    = 0x111111;

// -----------------------------------------------------------------------------
// Three.js bootstrap
// -----------------------------------------------------------------------------
const canvas = document.getElementById("scene");

// alpha:true so the CSS sky gradient behind the canvas shows through;
// see the canvas#scene style block for why the sky is not a scene texture.
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
// ACES filmic tone mapping rolls off highlights gently so the pure-white walls
// grade smoothly instead of clipping to a flat 255. This is what lets the walls
// keep their form (and stay distinct from a light floor) without us having to
// darken the courtyard to force contrast.
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;

// Soft image-based lighting: a neutral indoor probe gives the matte white walls
// and GLB furniture believable ambient fill and subtle gradients that no amount
// of flat ambient/hemisphere light can match. Cheap (baked once at startup).

// --- On-demand rendering -----------------------------------------------------
// The GTAO composer is fill-rate heavy; re-drawing an unchanging scene wastes the

// GLB/texture loads settle; camera motion (incl. damping) is detected each frame
// from controls.update(); rise/tween animations keep drawing while active.
// Quality is unchanged — idle scenes simply pause.
let renderFrames = 3;
function invalidate(frames = 8) {
  if (frames > renderFrames) renderFrames = frames;
}

  radius: 0.28,
  distanceExponent: 1.0,
  thickness: 1.0,

  // AO is low-frequency (soft corner shading), so fewer samples + the half-res
  // buffers below (see onResize) cut the fill-rate cost sharply with no visible
  // quality loss — the denoise pass smooths the result either way.
  samples: 8,
  screenSpaceRadius: false,
};
gtaoPass.updateGtaoMaterial(gtaoAoParameters);

function createConcreteTexture() {
  // A calm night lawn: a dark green base with fine blade strokes in tightly
  // related greens only (no brown, no broad mottled patches, no bright sunlit
  // tips) so it reads as even turf under moonlight instead of a blotchy or
  // daytime-bright surface.
  const textureCanvas = document.createElement("canvas");
  textureCanvas.width = 256;
  textureCanvas.height = 256;
  const context = textureCanvas.getContext("2d");
  context.fillStyle = `#${COLOR_CONCRETE.toString(16).padStart(6, "0")}`;
  context.fillRect(0, 0, textureCanvas.width, textureCanvas.height);
  // Shadow blades (the bulk of the texture) — a touch darker than the base.
  for (let index = 0; index < 2400; index += 1) {
    const g = 58 + Math.floor(Math.random() * 32);
    const r = 30 + Math.floor(Math.random() * 16);
    const b = 28 + Math.floor(Math.random() * 14);
    context.fillStyle = `rgba(${r},${g},${b},0.34)`;
    context.fillRect(
      Math.random() * textureCanvas.width,
      Math.random() * textureCanvas.height,
      1,
      2 + Math.random() * 3,
    );
  }
  // Slightly lighter blades for gentle texture — still dim, still green.
  for (let index = 0; index < 900; index += 1) {
    const g = 92 + Math.floor(Math.random() * 28);
    const r = 46 + Math.floor(Math.random() * 18);
    const b = 40 + Math.floor(Math.random() * 14);
    context.fillStyle = `rgba(${r},${g},${b},0.26)`;
    context.fillRect(
      Math.random() * textureCanvas.width,
      Math.random() * textureCanvas.height,
      1,
      1 + Math.random() * 2,
    );
  }
  // Sparse cool moonlight glints so the lawn isn't perfectly flat.
  for (let index = 0; index < 170; index += 1) {
    const g = 118 + Math.floor(Math.random() * 26);
    context.fillStyle = `rgba(72,${g},80,0.15)`;
    context.fillRect(
      Math.random() * textureCanvas.width,
      Math.random() * textureCanvas.height,
      1,
      1,
    );
  }
  const texture = new THREE.CanvasTexture(textureCanvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(24, 24);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

// Last-loaded plan's camera framing is retained while switching views.
let currentFraming = null;

// -----------------------------------------------------------------------------
// Resize
// -----------------------------------------------------------------------------
function framingDistance(radius, aspect) {
  const fovY = THREE.MathUtils.degToRad(camera.fov);
  const fovX = 2 * Math.atan(Math.tan(fovY / 2) * aspect);
  return radius / Math.sin(Math.min(fovY, fovX) / 2) * 1.15;
}

function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  const oldFitDistance = currentFraming
    ? framingDistance(currentFraming.radius, camera.aspect)
    : null;
  const currentDistance = camera.position.distanceTo(controls.target);
  const direction = camera.position.clone().sub(controls.target).normalize();
  // updateStyle=true (the default) is critical: with `false`, Three.js sets
  // only canvas.width/height (the drawing buffer, in device pixels) and
  // leaves CSS layout to size the canvas by its HTML width/height attrs.
  // For a <canvas> (replaced element), the intrinsic w/h from those attrs
  // wins over CSS `inset: 0`, so the canvas's CSS box ended up at
  // (viewport * devicePixelRatio) — bigger than the viewport, with the
  // optical-axis center offscreen to the bottom-right.
  renderer.setSize(w, h, true);
  composer.setSize(w, h);
  // AO runs at half resolution: GTAOPass.setSize only resizes its internal
  // depth/normal/AO/denoise targets — the final composite still copies the
  // full-res beauty and blends the (bilinearly upsampled) half-res AO over it,
  // so the scene stays sharp and only the low-frequency AO is coarser.
  gtaoPass.setSize(Math.max(1, Math.round(w / 2)), Math.max(1, Math.round(h / 2)));
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (oldFitDistance && currentDistance > 0) {
    const newFitDistance = framingDistance(currentFraming.radius, camera.aspect);
    camera.position.copy(controls.target).addScaledVector(
      direction,
      currentDistance * newFitDistance / oldFitDistance,
    );
    controls.update();
  }
  invalidate(30);
}
window.addEventListener("resize", onResize);
onResize();

// Auto-frame: position the camera so a sphere of `radius` around `center` fits
// in view with a small margin. Uses the more restrictive of the horizontal /
// vertical FOV so the model fits in both axes. Direction is fixed (south-east
// looking down ~30°) so lighting and edge highlights stay consistent.
function frameModel(center, radius) {
  camera.position.copy(perspectivePosition(center, radius));
  controls.target.copy(center);
  controls.update();
}

function perspectivePosition(center, radius) {
  const dist = framingDistance(radius, camera.aspect);
  const dir = new THREE.Vector3(0.55, 0.62, 0.85).normalize();
  return center.clone().addScaledVector(dir, dist);
}

// These values and the cubic-out interpolation below mirror the original
// Yytsi/floorplan-to-3d Show original camera glide.
function overheadPosition(center, radius) {
  const dist = framingDistance(radius, camera.aspect);
  return new THREE.Vector3(center.x, center.y + dist, center.z + 0.001);
}

const cameraTween = { active: false, resolve: null };

function finishCameraTween(completed) {
  const resolve = cameraTween.resolve;
  cameraTween.active = false;
  cameraTween.resolve = null;
  resolve?.(completed);
}

function moveCameraImmediately(toPos, toTarget) {
  finishCameraTween(false);
  camera.position.copy(toPos);
  controls.target.copy(toTarget);
  controls.update();
}

function tweenCamera(toPos, toTarget, duration = CAMERA_TWEEN_MS) {
  finishCameraTween(false);
  cameraTween.fromPos = camera.position.clone();
  cameraTween.toPos = toPos.clone();
  cameraTween.fromTarget = controls.target.clone();
  cameraTween.toTarget = toTarget.clone();
  cameraTween.t0 = performance.now();
  cameraTween.duration = duration;
  cameraTween.active = true;
  return new Promise(resolve => { cameraTween.resolve = resolve; });
}

function updateCameraPresetButtons() {
  cameraViewButtons.forEach(button => {
    const active = button.dataset.cameraView === activeCameraView;
    button.classList.toggle("active", active);
    if (button.dataset.cameraView === "auto") {

}

function stopAutoOrbit({ clearActive = true } = {}) {
  controls.autoRotate = false;
  if (clearActive && activeCameraView === "auto") activeCameraView = null;
  updateCameraPresetButtons();
}

async function applyCameraPreset(view) {
  if (!FIXED_CAMERA_VIEWS.includes(view) || !currentFraming || currentView === "original") return;
  stopAutoOrbit();
  const transitionId = ++cameraPresetTransitionId;
  const { center, radius } = currentFraming;
  const distance = framingDistance(radius, camera.aspect);
  const point = cameraPresetPosition(view, center, distance);
  const toPosition = new THREE.Vector3(point.x, point.y, point.z);
  activeCameraView = view;
  updateCameraPresetButtons();

  if (reducedMotionQuery.matches) {
    cameraPresetTransitionActive = false;
    moveCameraImmediately(toPosition, center);
    return;
  }
  cameraPresetTransitionActive = true;
  controls.enabled = false;
  await tweenCamera(toPosition, center, CAMERA_PRESET_TWEEN_MS);
  if (transitionId === cameraPresetTransitionId && currentView !== "original") {
    cameraPresetTransitionActive = false;
    controls.enabled = true;
    updateFurnitureInteractionUi();
  }
}

function toggleAutoOrbit() {
  if (controls.autoRotate) {
    stopAutoOrbit();
    return;
  }
  finishCameraTween(false);
  cameraPresetTransitionId += 1;
  cameraPresetTransitionActive = false;
  controls.enabled = true;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 3.0;
  activeCameraView = "auto";
  updateCameraPresetButtons();
}

// -----------------------------------------------------------------------------
// Polygon -> mesh
//
// Each polygon arrives as { outer: [[x, y], ...], holes: [[[x, y], ...], ...] }
// where x, y are in canvas pixels (image space, Y-down). We center on the
// plan's content rect, scale to world units, and build a THREE.Shape.
// ExtrudeGeometry then sweeps it along the local Z axis; we rotate the
// finished mesh by -90° around X so that local Z becomes world Y (up).
// Scaling local Z animates wall height without rebuilding geometry.
// -----------------------------------------------------------------------------
function buildShape(outer, holes, scale, cx, cy) {
  const shape = new THREE.Shape();
  outer.forEach(([x, y], i) => {
    const sx = (x - cx) * scale;
    const sy = -(y - cy) * scale;
    if (i === 0) shape.moveTo(sx, sy);
    else shape.lineTo(sx, sy);
  });
  shape.closePath();
  for (const hole of holes ?? []) {
    const path = new THREE.Path();
    hole.forEach(([x, y], i) => {
      const sx = (x - cx) * scale;
      const sy = -(y - cy) * scale;
      if (i === 0) path.moveTo(sx, sy);
      else path.lineTo(sx, sy);
    });
    path.closePath();
    shape.holes.push(path);
  }
  return shape;
}

function buildExtrudedMesh(polygon, scale, cx, cy, depth, material, withEdges) {
  const shape = buildShape(polygon.outer, polygon.holes, scale, cx, cy);
  const geom = new THREE.ExtrudeGeometry(shape, {
    depth,
    bevelEnabled: false,
    curveSegments: 4,
  });
  const mesh = new THREE.Mesh(geom, material);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  // Local Z (extrusion axis) becomes world Y (up).
  mesh.rotation.x = -Math.PI / 2;

  if (withEdges) {
    const edges = new THREE.EdgesGeometry(geom, EDGE_ANGLE_DEG);
    mesh.add(new THREE.LineSegments(edges, edgeMat));
  }
  return mesh;
}

function buildVerticalSection(polygon, scale, cx, cy, bottom, top, material, withEdges = true) {
  if (top <= bottom) return null;
  const mesh = buildExtrudedMesh(polygon, scale, cx, cy, top - bottom, material, withEdges);
  mesh.position.y = bottom;
  return mesh;
}

function polygonCentroidImage(poly) {
  let sx = 0, sy = 0;
  for (const [x, y] of poly.outer) { sx += x; sy += y; }
  const n = poly.outer.length;
  return [sx / n, sy / n];
}

// Bounding box (in image-pixel coordinates) over every polygon ring of every
// class. We center the world on this bbox rather than on the SVG content rect:
// the SVG can have whitespace inside its viewBox, so the building's geometric
// center is not always the canvas center, which would otherwise leave the
// orbit pivot off to one side of the model.
function polygonsBBox(polygons) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const cls of ["wall", "door", "window"]) {
    for (const p of polygons[cls] ?? []) {
      for (const [x, y] of p.outer) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }
  return { minX, minY, maxX, maxY };
}

// Build a textured plane that shows the original SVG laying flat under the
// rising 3D geometry. Sized & positioned so its pixels align 1:1 with the
// polygon coordinates, so as walls rise from y=0 they appear to extrude
// directly out of the inked outlines on the floor.
function buildInputImagePlane(b64, contentRect, scale, cx, cy) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const tex = new THREE.Texture(img);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      // Pixel Y increases toward world +Z for both the texture and polygons.
      // After rotating the plane flat, Three.js's normal image flip maps the
      // source image rows to that same axis.
      tex.flipY = true;
      tex.needsUpdate = true;

      const [left, top, innerW, innerH] = contentRect;
      const planeGeom = new THREE.PlaneGeometry(innerW * scale, innerH * scale);
      planeGeom.rotateX(-Math.PI / 2);
      const mat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true,
        // Keep the floor plane visible through the SVG's whitespace; the SVG
        // itself is rendered with a transparent background server-side.
        depthWrite: false,
      });
      const plane = new THREE.Mesh(planeGeom, mat);
      // Position so the content rect aligns pixel-for-pixel with the polygons.
      plane.position.set(
        (left + innerW / 2 - cx) * scale,
        0.002,                                  // tiny lift to avoid z-fighting with the floor
        (top + innerH / 2 - cy) * scale,
      );
      plane.userData.disposable = { texture: tex };
      // Marker so the "Show original" toggle can leave this plane visible
      // while hiding the extruded geometry on top of it.
      plane.userData.isInputImage = true;
      resolve(plane);
    };
    img.onerror = reject;
    img.src = "data:image/png;base64," + b64;
  });
}

function rebuildFloorFinish(data, layout) {
  const { scale, cx, cy, hasPhysicalScale, furnitureSceneScale } = layout;
  const [width, height] = data.canvas_size ?? [1024, 1024];
  const mask = buildInteriorMask(data.polygons ?? {}, width, height, data.openings ?? []);
  while (finishGroup.children.length > 0) {
    const finish = finishGroup.children[0];
    finishGroup.remove(finish);
    disposeMeshDeep(finish);
    if (Array.isArray(finish.material)) finish.material.forEach(material => material.dispose());
    else finish.material?.dispose();
  }
  const textureCanvas = document.createElement("canvas");
  textureCanvas.width = width;
  textureCanvas.height = height;
  const context = textureCanvas.getContext("2d");
  const image = context.createImageData(width, height);
  image.data.set(buildFloorFinishRgba({
    floorMaterials: data.floor_materials,
    height,
    interiorMask: mask,
    width,
  }));
  context.putImageData(image, 0, 0);

  const texture = new THREE.CanvasTexture(textureCanvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.flipY = true;
  texture.needsUpdate = true;
  const geometry = new THREE.PlaneGeometry(width * scale, height * scale);
  geometry.rotateX(-Math.PI / 2);
  const material = new THREE.MeshStandardMaterial({
    map: texture,
    transparent: true,
    roughness: 0.82,
    metalness: 0,
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(
    (width / 2 - cx) * scale,
    0.004,
    (height / 2 - cy) * scale,
  );
  mesh.receiveShadow = true;
  mesh.userData.disposable = { texture };
  finishGroup.add(mesh);
  floorPlacementState = {
    mask,
    width,
    height,
    scale,
    cx,
    cy,
    hasPhysicalScale,
    furnitureSceneScale,
  };
  floorFinishLayout = layout;
  invalidate(90);
}

function decodeInputImageRgba(base64, width, height) {
  return new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d", { willReadFrequently: true });
      if (!context) {
        reject(new Error("Unable to read the floor-plan image"));
        return;
      }
      context.drawImage(image, 0, 0, width, height);
      resolve(context.getImageData(0, 0, width, height).data);
    };
    image.onerror = () => reject(new Error("Unable to decode the floor-plan image"));
    image.src = "data:image/png;base64," + base64;
  });
}

async function ensureRoomLogSession() {
  if (roomLogSessionBridgeAttempted || !window.location.pathname.startsWith("/floor-plan-3d/")) return;
  roomLogSessionBridgeAttempted = true;

  const token = window.localStorage.getItem("floorPlanAccessToken");
  if (!token) return;

  try {
    const response = await fetch("/api/auth/floor-plan-session", {
      credentials: "same-origin",
      headers: { Authorization: `Bearer ${token}` },
      method: "POST",
    });
    if (response.status === 401) {
      window.localStorage.removeItem("floorPlanAccessToken");
    }
    if (!response.ok) {
      console.warn("RoomLog floor-plan session bridge unavailable.", response.status);
    }
  } catch (error) {
    console.warn("RoomLog floor-plan session bridge unavailable.", error);
  }
}

async function ensureRoomFloorMaterials() {
  if (currentComposedPlan?.floor_materials) return true;
  if (!currentComposedPlan?.input_image_b64 || !floorFinishLayout) return false;

  let analysisRooms = [];
  try {
    await ensureRoomLogSession();
    const response = await fetch("/room-materials", {
      body: JSON.stringify({
        imageDataUrl: `data:image/png;base64,${currentComposedPlan.analysis_image_b64 ?? currentComposedPlan.input_image_b64}`,
      }),
      headers: { "Content-Type": "application/json" },
      method: "POST",
    });
    if (!response.ok) {
      throw new Error(await responseError(response, `Room analysis failed (${response.status})`));
    }
    const analysis = await response.json();
    if (analysis.status !== "ready" || !Array.isArray(analysis.rooms) || analysis.rooms.length === 0) {
      throw new Error(analysis.summary || "No room labels were detected");
    }
    analysisRooms = analysis.rooms;
  } catch (error) {
    console.warn("Room analysis unavailable; using label-free floor materials.", error);
  }

  const [width, height] = currentComposedPlan.canvas_size ?? [1024, 1024];
  const interiorMask = buildInteriorMask(
    currentComposedPlan.polygons ?? {},
    width,
    height,
    currentComposedPlan.openings ?? [],
  );
  const sourceRgba = await decodeInputImageRgba(currentComposedPlan.input_image_b64, width, height);
  currentComposedPlan.floor_materials = buildRoomFloorMaterialMap({
    height,
    interiorMask,
    millimetersPerPixel: currentComposedPlan.calibration?.millimetersPerPixel ?? null,
    openings: currentComposedPlan.openings ?? [],
    polygons: currentComposedPlan.polygons ?? {},
    rooms: analysisRooms,
    sourceRgba,
    width,
  });
  rebuildFloorFinish(currentComposedPlan, floorFinishLayout);
  return true;
}

function pointIsInsideFinishedFloor(point) {
  if (!floorPlacementState) return false;
  const pixel = worldToMaskPixel(point, floorPlacementState);
  return maskContains(
    floorPlacementState.mask,
    floorPlacementState.width,
    floorPlacementState.height,
    pixel.x,
    pixel.y,
  );
}

// -----------------------------------------------------------------------------
// Animation — each mesh has a delay and a duration. Every frame we recompute
// scale.z (which after rotation is world-Y), so the wall grows from a flat
// footprint up to its full height.
// -----------------------------------------------------------------------------
const animations = [];

function tick(now) {
  let active = false;
  for (const a of animations) {
    applyRiseAnimationFrame(a, now);
    const delay = Number.isFinite(a.delay) ? a.delay : 0;
    const dur = Number.isFinite(a.duration) && a.duration > 0 ? a.duration : 1;
    const start = Number.isFinite(a.start) ? a.start : now;
    if (now - start - delay < dur) active = true;
  }
  if (cameraTween.active) {
    const t = Math.min(1, (now - cameraTween.t0) / cameraTween.duration);
    const eased = 1 - Math.pow(1 - t, 3);
    camera.position.lerpVectors(cameraTween.fromPos, cameraTween.toPos, eased);
    controls.target.lerpVectors(cameraTween.fromTarget, cameraTween.toTarget, eased);
    if (t >= 1) finishCameraTween(true);
    active = true;
  }
  const controlsChanged = controls.update();
  updateFurnitureFloatingToolbarPosition();
  if (active || controlsChanged || renderFrames > 0) {
    if (renderFrames > 0) renderFrames--;
    composer.render();
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// -----------------------------------------------------------------------------
// Plan lifecycle
// -----------------------------------------------------------------------------
function disposeMeshDeep(obj) {
  if (obj.geometry) obj.geometry.dispose();
  if (obj.userData?.disposable?.texture) obj.userData.disposable.texture.dispose();
  for (const c of obj.children) disposeMeshDeep(c);
}
function clearPlan() {
  finishCameraTween(false);
  cameraPresetTransitionId += 1;
  cameraPresetTransitionActive = false;
  stopAutoOrbit();
  currentFraming = null;
  resetFurniturePlacements({ silent: true });
  while (planGroup.children.length > 0) {
    const c = planGroup.children[0];
    planGroup.remove(c);
    disposeMeshDeep(c);
  }
  while (finishGroup.children.length > 0) {
    const finish = finishGroup.children[0];
    finishGroup.remove(finish);
    disposeMeshDeep(finish);
    if (Array.isArray(finish.material)) {
      finish.material.forEach(material => material.dispose());
    } else {
      finish.material?.dispose();
    }
  }
  floorPlacementState = null;
  floorFinishLayout = null;
  animations.length = 0;
}

function setPlanGeometryVisible(visible) {
  for (const child of planGroup.children) {
    if (!child.userData?.isInputImage) child.visible = visible;
  }
}

async function loadPlan(data) {
  // Center on the polygon bbox, not the SVG content rect — the SVG often has
  // whitespace inside its viewBox, so the building's geometric center can
  // sit a meaningful distance off the canvas center. Anchoring on the bbox
  // puts the orbit pivot exactly on the model.
  const bbox = polygonsBBox(data.polygons ?? {});
  const bw = bbox.maxX - bbox.minX;
  const bh = bbox.maxY - bbox.minY;
  if (!isFinite(bw) || bw <= 0 || bh <= 0) {
    return false;
  }
  clearPlan();
  const cx = (bbox.minX + bbox.maxX) / 2;
  const cy = (bbox.minY + bbox.maxY) / 2;
  const millimetersPerPixel = Number(data.calibration?.millimetersPerPixel);
  const hasPhysicalScale = Number.isFinite(millimetersPerPixel) && millimetersPerPixel > 0;
  const scale = hasPhysicalScale
    ? millimetersPerPixel / 1000
    : TARGET_PLAN_SIZE / Math.max(bw, bh);
  const wallHeight = hasPhysicalScale ? PHYSICAL_WALL_HEIGHT : WALL_HEIGHT;
  const windowSill = hasPhysicalScale ? PHYSICAL_WINDOW_SILL : WINDOW_SILL;
  const windowTop = hasPhysicalScale ? PHYSICAL_WINDOW_TOP : WINDOW_TOP;
  const furnitureSceneScale = hasPhysicalScale
    ? 1
    : WALL_HEIGHT / PHYSICAL_WALL_HEIGHT;

  rebuildFloorFinish(data, { scale, cx, cy, hasPhysicalScale, furnitureSceneScale });

  // Frame the camera on the model's actual world bbox. After centering, the
  // model is at world (0, WALL_HEIGHT/2, 0), with horizontal extent bw*scale x
  // bh*scale. Bounding sphere radius covers the diagonal plus a bit of height.
  const halfW = bw * scale / 2;
  const halfD = bh * scale / 2;
  const center = new THREE.Vector3(0, wallHeight / 2, 0);
  const radius = Math.hypot(halfW, halfD, wallHeight);
  currentFraming = { center, radius };
  frameModel(center, radius);

  // Resize the exterior lawn to the building footprint + a modest margin, so the
  // yard reads as a bounded lot instead of the sprawling fixed plane. The model
  // is centered at the origin, so a symmetric plane covers it. The texture
  // repeat tracks the plane size to keep the blade scale constant (one tile ≈
  // 2.5 world units, matching the saved-view renderer's concreteTileWorldSize).
  const lawnMargin = Math.max(bw, bh) * scale * GROUND_LAWN_MARGIN;
  const lawnW = bw * scale + lawnMargin * 2;
  const lawnD = bh * scale + lawnMargin * 2;
  floor.geometry.dispose();
  const lawnGeom = new THREE.PlaneGeometry(lawnW, lawnD);
  lawnGeom.rotateX(-Math.PI / 2);
  floor.geometry = lawnGeom;
  if (floor.material.map) {
    floor.material.map.repeat.set(Math.max(1, lawnW / 2.5), Math.max(1, lawnD / 2.5));
    floor.material.map.needsUpdate = true;
  }
  activeCameraView = "perspective";
  updateCameraPresetButtons();

  // Drop the input image in first so it appears under the geometry as the
  // walls start rising. Awaiting here also lets the texture decode finish
  // before the first paint, preventing a one-frame flash of blank floor.
  if (data.input_image_b64) {
    try {
      const plane = await buildInputImagePlane(
        data.input_image_b64, data.content_rect, scale, cx, cy,
      );
      planGroup.add(plane);
    } catch (e) {
      console.warn("input image failed to load:", e);
    }
  }

  // One flat list so we can sort all elements by spatial centrality and
  // get a single coherent stagger across walls/doors/windows.
  const items = [];
  for (const p of data.polygons.wall ?? [])   items.push({ poly: p, kind: "wall" });
  for (const p of data.polygons.door ?? [])   items.push({ poly: p, kind: "door" });
  for (const p of data.polygons.window ?? []) items.push({ poly: p, kind: "window" });
  items.sort((a, b) => {
    const [ax, ay] = polygonCentroidImage(a.poly);
    const [bx, by] = polygonCentroidImage(b.poly);
    return Math.hypot(ax - cx, ay - cy) - Math.hypot(bx - cx, by - cy);
  });

  const start = performance.now();

  items.forEach((item, i) => {
    const meshes = [];
    if (item.kind === "wall") {
      meshes.push(buildVerticalSection(item.poly, scale, cx, cy, 0, wallHeight, wallMaterials, true));
    } else if (item.kind === "door") {
      // Doors stay fully open — no header wall above the opening.
    } else {
      // Restore the wall below and above the full-height cut, leaving glass
      // only between sill and lintel.
      meshes.push(buildVerticalSection(item.poly, scale, cx, cy, 0, windowSill, wallMaterials, true));
      meshes.push(buildVerticalSection(item.poly, scale, cx, cy, windowSill, windowTop, windowMat, true));
      meshes.push(buildVerticalSection(item.poly, scale, cx, cy, windowTop, wallHeight, wallMaterials, true));
    }
    meshes.filter(Boolean).forEach((mesh, sectionIndex) => {
      mesh.userData.structureKind = item.kind;
      const finalBottom = mesh.position.y;
      mesh.position.y = 0;
      mesh.scale.z = 0.001;  // start collapsed
      planGroup.add(mesh);
      animations.push({
        mesh,
        finalBottom,
        start,
        delay:    waveDelayMs(i, items.length) + sectionIndex * 36,
        duration: RISE_DURATION_MS,
      });
    });
  });

  return true;
}

function furnitureCategoryLabel(category) {
  return category === "all" ? "전체" : FURNITURE_CATEGORY_LABELS[category] ?? category;
}

function furnitureDisplayName(itemOrFileName) {
  if (typeof itemOrFileName === "object" && itemOrFileName?.displayName) {
    return itemOrFileName.displayName;
  }
  const fileName = typeof itemOrFileName === "object" ? itemOrFileName?.fileName : itemOrFileName;
  const cleaned = String(fileName ?? "")
    .replace(/\.glb$/i, "")
    .replace(/^ikea-/i, "")
    .replace(/-?[a-z]?\d{6,}$/i, "");
  const displayName = cleaned
    .split("-")
    .filter(Boolean)
    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
    .join(" ");
  return displayName || String(fileName ?? "가구");
}

function furnitureDimensionLabel(item) {
  const { width, height, depth } = item.sizeMm;
  // Manifest convention: width × height × depth, in millimeters.
  return `${Math.round(width)}×${Math.round(height)}×${Math.round(depth)}mm`;
}

function furnitureSearchPool() {
  const term = furnitureSearch.value.trim().toLowerCase();
  if (!term) return furnitureCatalog;
  return furnitureCatalog.filter(item => {
    const category = furnitureCategoryLabel(item.category).toLowerCase();
    return item.fileName.toLowerCase().includes(term)
      || furnitureDisplayName(item).toLowerCase().includes(term)
      || item.category.toLowerCase().includes(term)
      || category.includes(term);
  });
}

function renderFurnitureCatalog() {
  const pool = furnitureSearchPool();
  const category = furnitureCategory.value || "all";
  const visible = filterFurnitureCatalog(
    pool,
    "",
    category,
    FURNITURE_PAGE_SIZE,
    catalogOffset,
  );
  const nextPage = filterFurnitureCatalog(
    pool,
    "",
    category,
    FURNITURE_PAGE_SIZE,
    catalogOffset + FURNITURE_PAGE_SIZE,
  );
  const total = pool.reduce(
    (count, item) => count + Number(category === "all" || item.category === category),
    0,
  );

  const cards = visible.map(item => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "furniture-card";
    button.dataset.modelUrl = item.modelUrl;

    const swatch = document.createElement("span");
    swatch.className = "furniture-card-swatch";
    if (item.thumbnailUrl) {
      const image = document.createElement("img");
      image.alt = "";
      image.loading = "lazy";
      image.src = item.thumbnailUrl;
      image.addEventListener("error", () => image.remove());
      swatch.append(image);
    }

    const details = document.createElement("span");
    const name = document.createElement("span");
    name.className = "furniture-card-name";
    name.textContent = furnitureDisplayName(item);
    const meta = document.createElement("span");
    meta.className = "furniture-card-meta";
    meta.textContent = furnitureCategoryLabel(item.category);
    const size = document.createElement("span");
    size.className = "furniture-card-size";
    size.textContent = furnitureDimensionLabel(item);
    details.append(name, meta, size);
    button.append(swatch, details);
    button.addEventListener("click", () => beginFurniturePlacement(item));
    return button;
  });

  if (cards.length) {
    furnitureResults.replaceChildren(...cards);
  } else {
    const empty = document.createElement("div");
    empty.className = "furniture-empty";
    empty.textContent = "조건에 맞는 가구가 없습니다.";
    furnitureResults.replaceChildren(empty);
  }

  furnitureCategoryChips.querySelectorAll("[data-category]").forEach(chip => {
    const active = chip.dataset.category === category;
    chip.classList.toggle("active", active);
    chip.setAttribute("aria-pressed", String(active));
  });
  furniturePagination.hidden = total <= FURNITURE_PAGE_SIZE;
  furniturePreviousButton.disabled = catalogOffset === 0;
  furnitureNextButton.disabled = nextPage.length === 0;
  const first = total ? catalogOffset + 1 : 0;
  furniturePageSummary.textContent = `${first}–${catalogOffset + visible.length} / ${total}`;
}

function fillFurnitureCategories() {
  const categoryCounts = new Map();
  for (const item of furnitureCatalog) {
    categoryCounts.set(item.category, (categoryCounts.get(item.category) ?? 0) + 1);
  }
  const known = Object.keys(FURNITURE_CATEGORY_LABELS).filter(category => categoryCounts.has(category));
  const extra = [...categoryCounts.keys()]
    .filter(category => !Object.hasOwn(FURNITURE_CATEGORY_LABELS, category))
    .sort((left, right) => left.localeCompare(right, "ko"));
  const categories = ["all", ...known, ...extra];
  if (!categories.includes(furnitureCategory.value)) furnitureCategory.value = "all";

  const options = categories.map(category => {
    const option = document.createElement("option");
    option.value = category;
    option.textContent = furnitureCategoryLabel(category);
    return option;
  });
  furnitureCategory.replaceChildren(...options);
  furnitureCategory.value = categories.includes(furnitureCategory.value)
    ? furnitureCategory.value
    : "all";

  const chips = categories.map(category => {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "furniture-category-chip";
    chip.dataset.category = category;
    const count = category === "all" ? furnitureCatalog.length : categoryCounts.get(category) ?? 0;
