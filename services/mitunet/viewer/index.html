async function ensureFurnitureCatalog({ retry = false } = {}) {
  if (retry) furnitureCatalogPromise = null;
  if (!furnitureCatalogPromise) {
    furnitureCatalogPromise = (async () => {
      const response = await fetch(FURNITURE_MANIFEST_URL, { cache: "no-store" });
      if (!response.ok) throw new Error(`Furniture catalog failed (${response.status})`);
      const catalog = normalizeFurnitureCatalog(await response.json());
      if (!catalog.length) throw new Error("Furniture catalog is empty");
      return catalog;
    })();
  }
  try {
    furnitureCatalog = await furnitureCatalogPromise;
    return furnitureCatalog;
  } catch (error) {
    furnitureCatalogPromise = null;
    throw error;
  }
}

function furnitureMaterials(node) {
  if (!node?.isMesh || !node.material) return [];
  return Array.isArray(node.material) ? node.material : [node.material];
}

function cloneFurnitureInstance(template) {
  const instance = template.clone(true);
  instance.traverse(node => {
    if (!node.isMesh || !node.material) return;
    node.material = Array.isArray(node.material)
      ? node.material.map(material => material.clone())
      : node.material.clone();
    node.userData.ownsFurnitureMaterials = true;
    node.castShadow = true;
    node.receiveShadow = true;
  });
  return instance;
}

async function loadFurnitureTemplate(item) {
  let templatePromise = furnitureModelCache.get(item.modelUrl);
  if (!templatePromise) {
    templatePromise = gltfLoader.loadAsync(item.modelUrl).then(gltf => {
      if (!gltf.scene) throw new Error("GLB scene is empty");
      return gltf.scene;
    });
    furnitureModelCache.set(item.modelUrl, templatePromise);
    void templatePromise.catch(() => {
      if (furnitureModelCache.get(item.modelUrl) === templatePromise) {
        furnitureModelCache.delete(item.modelUrl);
      }
    });
  }
  return cloneFurnitureInstance(await templatePromise);
}

function normalizeFurnitureObject(source, item) {
  const furnitureSceneScale = floorPlacementState?.furnitureSceneScale
    ?? WALL_HEIGHT / PHYSICAL_WALL_HEIGHT;
  source.updateMatrixWorld(true);
  const initialBox = new THREE.Box3().setFromObject(source);
  const initialSize = initialBox.getSize(new THREE.Vector3());
  if (initialSize.x <= 0 || initialSize.y <= 0 || initialSize.z <= 0) {
    throw new Error("GLB model has no measurable volume");
  }
  source.scale.multiply(new THREE.Vector3(
    item.sizeMeters.width * furnitureSceneScale / initialSize.x,
    item.sizeMeters.height * furnitureSceneScale / initialSize.y,
    item.sizeMeters.depth * furnitureSceneScale / initialSize.z,
  ));
  source.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(source);
  const center = box.getCenter(new THREE.Vector3());
  source.position.x -= center.x;
  source.position.y -= box.min.y;
  source.position.z -= center.z;
  source.updateMatrixWorld(true);

  const root = new THREE.Group();
  root.add(source);
  root.position.y = 0.006;
  root.userData.catalogItem = item;
  return root;
}

function rememberPreviewAppearance(node) {
  if (node.userData.previewMaterialState) return;
  node.userData.previewMaterialState = furnitureMaterials(node).map(material => ({
    color: material.color?.clone() ?? null,
    opacity: material.opacity,
    transparent: material.transparent,
    depthWrite: material.depthWrite,
  }));
}

function setPreviewAppearance(object, valid) {
  const tint = new THREE.Color(valid ? 0x67b87a : 0xd95c5c);
  object.traverse(node => {
    const materials = furnitureMaterials(node);
    if (!materials.length) return;
    rememberPreviewAppearance(node);
    materials.forEach((material, index) => {
      const state = node.userData.previewMaterialState[index];
      material.transparent = true;
      // Mostly-opaque preview: the furniture itself must stay readable while
      // being placed; the valid/invalid tint is only a light wash on top.
      material.opacity = Math.min(state.opacity, 0.88);
      material.depthWrite = false;
      if (material.color && state.color) {
        material.color.copy(state.color).lerp(tint, 0.28);
      }
      material.needsUpdate = true;
    });
  });
}

function restorePlacedAppearance(object) {
  object.traverse(node => {
    const states = node.userData.previewMaterialState;
    if (!states) return;
    furnitureMaterials(node).forEach((material, index) => {
      const state = states[index];
      material.opacity = state.opacity;
      material.transparent = state.transparent;
      material.depthWrite = state.depthWrite;
      if (material.color && state.color) material.color.copy(state.color);
      material.needsUpdate = true;
    });
    delete node.userData.previewMaterialState;
  });
}

function disposeFurnitureMaterials(object) {
  object?.traverse(node => {
    if (!node.userData.ownsFurnitureMaterials) return;
    for (const material of furnitureMaterials(node)) material.dispose();
    delete node.userData.ownsFurnitureMaterials;
    delete node.userData.previewMaterialState;
  });
}

function furnitureFootprintCorners(position, item, rotationY) {
  const sceneScale = floorPlacementState?.furnitureSceneScale
    ?? WALL_HEIGHT / PHYSICAL_WALL_HEIGHT;
  const halfWidth = item.sizeMeters.width * sceneScale / 2;
  const halfDepth = item.sizeMeters.depth * sceneScale / 2;
  const cosine = Math.cos(rotationY);
  const sine = Math.sin(rotationY);
  return [
    [-halfWidth, -halfDepth],
    [halfWidth, -halfDepth],
    [halfWidth, halfDepth],
    [-halfWidth, halfDepth],
  ].map(([x, z]) => ({
    x: position.x + x * cosine - z * sine,
    y: 0,
    z: position.z + x * sine + z * cosine,
  }));
}

function furnitureFootprintFits(position, item, rotationY) {
  if (!floorPlacementState || !pointIsInsideFinishedFloor(position)) return false;
  // Sample the whole footprint, not just its corners: an interior wall is only
  // a few mask pixels thick, so a long sofa straddling it can keep all four
  // corners (and the center) on valid floor while the wall runs straight
  // through the middle. A grid at ~2-mask-pixel spacing cannot miss it.
  const sceneScale = floorPlacementState.furnitureSceneScale
    ?? WALL_HEIGHT / PHYSICAL_WALL_HEIGHT;
  const halfWidth = item.sizeMeters.width * sceneScale / 2;
  const halfDepth = item.sizeMeters.depth * sceneScale / 2;
  const sampleGap = floorPlacementState.scale * 2;
  const stepsX = Math.min(48, Math.max(1, Math.ceil((halfWidth * 2) / sampleGap)));
  const stepsZ = Math.min(48, Math.max(1, Math.ceil((halfDepth * 2) / sampleGap)));
  const cosine = Math.cos(rotationY);
  const sine = Math.sin(rotationY);
  for (let i = 0; i <= stepsX; i += 1) {
    const localX = -halfWidth + (i * (halfWidth * 2)) / stepsX;
    for (let j = 0; j <= stepsZ; j += 1) {
      const localZ = -halfDepth + (j * (halfDepth * 2)) / stepsZ;
      const point = {
        x: position.x + localX * cosine - localZ * sine,
        y: 0,
        z: position.z + localX * sine + localZ * cosine,
      };
      if (!pointIsInsideFinishedFloor(point)) return false;
    }
  }
  return true;
}

// ---------------------------------------------------------------------------
// Placement capabilities: shallow items can hang on walls, small items can sit
// on top of tables/storage, and no two pieces may occupy the same space. Two
// pieces collide only when their 2D footprints AND vertical spans overlap, so
// a mirror on a table or a TV above a sofa is fine while sofa-through-sofa is
// not.
// ---------------------------------------------------------------------------
const WALL_MOUNT_MAX_DEPTH_MM = 150;
const STACKABLE_MAX_FOOTPRINT_MM = 650;
const STACKABLE_MAX_HEIGHT_MM = 800;
const FURNITURE_SURFACE_CATEGORIES = new Set(["테이블·책상", "수납"]);

const furnitureSceneScaleNow = () => floorPlacementState?.furnitureSceneScale
  ?? WALL_HEIGHT / PHYSICAL_WALL_HEIGHT;
const itemIsWallMountable = item => {
  const depth = Number(item.sizeMm?.depth);
  return depth > 0 && depth <= WALL_MOUNT_MAX_DEPTH_MM;
};
const itemIsStackable = item => (
  Math.max(Number(item.sizeMm?.width) || Infinity, Number(item.sizeMm?.depth) || Infinity)
    <= STACKABLE_MAX_FOOTPRINT_MM
  && (Number(item.sizeMm?.height) || Infinity) <= STACKABLE_MAX_HEIGHT_MM
);
const entryIsSurface = entry => FURNITURE_SURFACE_CATEGORIES.has(entry.item.category);

function footprintRect(position, item, rotationY) {
  const sceneScale = furnitureSceneScaleNow();
  return {
    x: position.x,
    z: position.z,
    halfWidth: item.sizeMeters.width * sceneScale / 2,
    halfDepth: item.sizeMeters.depth * sceneScale / 2,
    rotationY,
  };
}

function rectCorners(rect) {
  const cosine = Math.cos(rect.rotationY);
  const sine = Math.sin(rect.rotationY);
  return [
    [-rect.halfWidth, -rect.halfDepth],
    [rect.halfWidth, -rect.halfDepth],
    [rect.halfWidth, rect.halfDepth],
    [-rect.halfWidth, rect.halfDepth],
  ].map(([x, z]) => ({
    x: rect.x + x * cosine - z * sine,
    z: rect.z + x * sine + z * cosine,
  }));
}

// Separating-axis test for two rotated rectangles on the floor plane.
function footprintRectsOverlap(a, b) {
  const cornersA = rectCorners(a);
  const cornersB = rectCorners(b);
  for (const rect of [a, b]) {
    const axes = [
      { x: Math.cos(rect.rotationY), z: Math.sin(rect.rotationY) },
      { x: -Math.sin(rect.rotationY), z: Math.cos(rect.rotationY) },
    ];
    for (const axis of axes) {
      const project = corners => {
        let min = Infinity;
        let max = -Infinity;
        for (const corner of corners) {
          const value = corner.x * axis.x + corner.z * axis.z;
          if (value < min) min = value;
          if (value > max) max = value;
        }
        return { min, max };
      };
      const spanA = project(cornersA);
      const spanB = project(cornersB);
      if (spanA.max <= spanB.min || spanB.max <= spanA.min) return false;
    }
  }
  return true;
}

function furnitureCollides(position, item, rotationY, baseY, excludePlacementId) {
  const sceneScale = furnitureSceneScaleNow();
  const candidateRect = footprintRect(position, item, rotationY);
  const candidateTop = baseY + item.sizeMeters.height * sceneScale;
  const epsilon = 0.01;
  for (const entry of placedFurnitures) {
    if (entry.placement.id === excludePlacementId) continue;
    const entryBase = entry.placement.position[1] ?? 0;
    const entryTop = entryBase + entry.item.sizeMeters.height * sceneScale;
    if (candidateTop <= entryBase + epsilon || entryTop <= baseY + epsilon) continue;
    const entryRect = footprintRect(
      { x: entry.placement.position[0], z: entry.placement.position[2] },
      entry.item,
      entry.placement.rotationY,
    );
    if (footprintRectsOverlap(candidateRect, entryRect)) return true;
  }
  return false;
}

// A stacked item must sit entirely on the support's top face.
function footprintWithinSupport(position, item, rotationY, supportEntry) {
  const sceneScale = furnitureSceneScaleNow();
  const supportRect = footprintRect(
    { x: supportEntry.placement.position[0], z: supportEntry.placement.position[2] },
    supportEntry.item,
    supportEntry.placement.rotationY,
  );
  const cosine = Math.cos(supportRect.rotationY);
  const sine = Math.sin(supportRect.rotationY);
  return rectCorners(footprintRect(position, item, rotationY)).every(corner => {
    const dx = corner.x - supportRect.x;
    const dz = corner.z - supportRect.z;
    const localX = dx * cosine + dz * sine;
    const localZ = -dx * sine + dz * cosine;
    return Math.abs(localX) <= supportRect.halfWidth + 0.001
      && Math.abs(localZ) <= supportRect.halfDepth + 0.001;
  });
}

function updateFurnitureInteractionUi() {
  if (currentView === "furnishing") {
    // While placing, the left button is reserved for dropping the furniture, so
    // camera rotate moves to the right button; wheel zoom stays available the
    // whole time. Outside placement the usual left-rotate / right-pan returns.
    const placing = Boolean(pendingFurniture);
    controls.enabled = !cameraPresetTransitionActive;
    controls.enableRotate = true;
    controls.enableZoom = true;
    controls.enablePan = !placing;
    controls.mouseButtons.LEFT = placing ? null : THREE.MOUSE.ROTATE;
    controls.mouseButtons.RIGHT = placing ? THREE.MOUSE.ROTATE : THREE.MOUSE.PAN;
  }
  const toolbarMode = resolveFurnitureToolbarMode({
    currentView,
    hasSelectedFurniture: Boolean(selectedFurniture),
    hasPendingFurniture: Boolean(pendingFurniture),
  });
  furnitureToolbar.hidden = toolbarMode === "hidden";
  furnitureSelectionToolbarActions.hidden = toolbarMode !== "selection";
  furniturePendingToolbarActions.hidden = toolbarMode !== "pending";
  furnitureConfirmButton.disabled = !pendingFurniture?.valid;
  if (toolbarMode === "hidden") furnitureToolbar.style.visibility = "hidden";
  furnitureResetButton.disabled = !pendingFurniture && placedFurnitures.length === 0;
  syncFurnitureHighlight();
  updateEditorControls();
}

// Subtle emissive lift on the selected furniture so the toolbar is not the
// only cue for what is selected. Original emissive values are remembered per
// material and restored on deselect; materials without emissive are skipped.
let highlightedFurniture = null;

function setFurnitureHighlight(object, active) {
  object.traverse(node => {
    furnitureMaterials(node).forEach(material => {
      if (!material.emissive) return;
      if (active) {
        if (!material.userData.selectionEmissive) {
          material.userData.selectionEmissive = material.emissive.clone();
          material.userData.selectionEmissiveIntensity = material.emissiveIntensity;
        }
        material.emissive.setHex(0x2f55ff);
        material.emissiveIntensity = 0.16;
      } else if (material.userData.selectionEmissive) {
        material.emissive.copy(material.userData.selectionEmissive);
        material.emissiveIntensity = material.userData.selectionEmissiveIntensity ?? 1;
        delete material.userData.selectionEmissive;
        delete material.userData.selectionEmissiveIntensity;
      }
      material.needsUpdate = true;
    });
  });
}

function syncFurnitureHighlight() {
  const target = pendingFurniture ? null : selectedFurniture;
  if (highlightedFurniture === target) return;
  if (highlightedFurniture) setFurnitureHighlight(highlightedFurniture, false);
  highlightedFurniture = target;
  if (highlightedFurniture) setFurnitureHighlight(highlightedFurniture, true);
}

function activeFurnitureToolbarObject() {
  return pendingFurniture?.object ?? selectedFurniture ?? null;
}

function updateFurnitureFloatingToolbarPosition() {
  if (furnitureToolbar.hidden) return;
  const target = activeFurnitureToolbarObject();
  if (!target) {
    furnitureToolbar.style.visibility = "hidden";
    return;
  }

  furnitureToolbarBounds.setFromObject(target);
  if (furnitureToolbarBounds.isEmpty()) {
    furnitureToolbar.style.visibility = "hidden";
    return;
  }

  furnitureToolbarBounds.getCenter(furnitureToolbarAnchor);
  furnitureToolbarAnchor.y = furnitureToolbarBounds.max.y;
  furnitureToolbarAnchor.project(camera);
  if (furnitureToolbarAnchor.z < -1 || furnitureToolbarAnchor.z > 1) {
    furnitureToolbar.style.visibility = "hidden";
    return;
  }

  const canvasRect = sceneCanvas.getBoundingClientRect();
  const position = positionFurnitureToolbar({
    anchorX: (furnitureToolbarAnchor.x + 1) * 0.5 * canvasRect.width,
    anchorY: (1 - furnitureToolbarAnchor.y) * 0.5 * canvasRect.height,
    toolbarWidth: furnitureToolbar.offsetWidth,
    toolbarHeight: furnitureToolbar.offsetHeight,
    viewportWidth: canvasRect.width,
    viewportHeight: canvasRect.height,
  });
  furnitureToolbar.style.left = `${canvasRect.left + position.left}px`;
  furnitureToolbar.style.top = `${canvasRect.top + position.top}px`;
  furnitureToolbar.style.visibility = "visible";
}

function cancelFurnitureInteraction({ clearSelection = true, silent = false } = {}) {
  furniturePlacementRequest += 1;
  const pending = pendingFurniture;
  pendingFurniture = null;
  if (pending?.object) {
    placementPreviewGroup.remove(pending.object);
    restorePlacedAppearance(pending.object);
    if (pending.existingEntry) {
      pending.object.position.copy(pending.originalTransform.position);
      pending.object.quaternion.copy(pending.originalTransform.quaternion);
      furnitureGroup.add(pending.object);
    } else {
      disposeFurnitureMaterials(pending.object);
    }
  }
  placementPreviewGroup.clear();
  if (clearSelection) selectedFurniture = null;
  updateFurnitureInteractionUi();
  if (!silent && pending) setStatus("가구 배치를 취소했습니다.");
}

function resetFurniturePlacements({ silent = false } = {}) {
  cancelFurnitureInteraction({ clearSelection: true, silent: true });
  for (const entry of placedFurnitures) {
    furnitureGroup.remove(entry.object);
    disposeFurnitureMaterials(entry.object);
  }
  placedFurnitures.length = 0;
  selectedFurniture = null;
  if (!silent) setStatus("배치한 가구를 모두 초기화했습니다.");
  updateFurnitureInteractionUi();
}

async function beginFurniturePlacement(item) {
  cancelFurnitureInteraction({ clearSelection: true, silent: true });
  const requestId = ++furniturePlacementRequest;
  pendingFurniture = {
    item,
    object: null,
    valid: false,
    existingEntry: null,
    originalTransform: null,
    trackingPointer: true,
  };
  updateFurnitureInteractionUi();
  setStatus(`${furnitureDisplayName(item)} 모델을 불러오는 중입니다…`);

  let source = null;
  let object = null;
  try {
    source = await loadFurnitureTemplate(item);
    object = normalizeFurnitureObject(source, item);
    if (requestId !== furniturePlacementRequest || pendingFurniture?.item !== item) {
      disposeFurnitureMaterials(object);
      return;
    }
    setPreviewAppearance(object, false);
    placementPreviewGroup.add(object);
    pendingFurniture.object = object;
    invalidate(90);
    setStatus(`${furnitureDisplayName(item)}을 놓을 위치를 클릭해 고정한 뒤 ✓를 누르세요.`);
  } catch (error) {
    if (object) disposeFurnitureMaterials(object);
    else if (source) disposeFurnitureMaterials(source);
    if (requestId !== furniturePlacementRequest) return;
    pendingFurniture = null;
    updateFurnitureInteractionUi();
    setStatus(`가구 로딩 실패: ${error.message}. 같은 항목을 눌러 다시 시도할 수 있습니다.`, "error");
  }
}

function updateRayFromPointer(event) {
  const rect = sceneCanvas.getBoundingClientRect();
  furniturePointer.set(
    ((event.clientX - rect.left) / rect.width) * 2 - 1,
    -((event.clientY - rect.top) / rect.height) * 2 + 1,
  );
  furnitureRaycaster.setFromCamera(furniturePointer, camera);
}

function updateFurniturePreview(event, { force = false } = {}) {
  if (currentView !== "furnishing" || !pendingFurniture?.object || !floorPlacementState) return;
  if (!shouldUpdateFurniturePreview({
    isTracking: pendingFurniture.trackingPointer,
    force,
  })) return false;
  updateRayFromPointer(event);
  const item = pendingFurniture.item;
  const sceneScale = furnitureSceneScaleNow();
  const itemHeight = item.sizeMeters.height * sceneScale;
  const excludeId = pendingFurniture.existingEntry?.placement.id;
  let mode = "floor";
  let supportEntry = null;
  let target = null;
  let baseY = 0.006;
  let rotationY = pendingFurniture.object.rotation.y;

  // Shallow items snap onto the wall face under the cursor; the cursor height
  // picks the mounting height (clamped inside the wall band).
  if (itemIsWallMountable(item)) {
    const wallMeshes = planGroup.children.filter(mesh => mesh.userData.structureKind === "wall");
    const hit = furnitureRaycaster.intersectObjects(wallMeshes, false)[0];
    if (hit?.face) {
      const normal = hit.face.normal.clone().transformDirection(hit.object.matrixWorld);
      normal.y = 0;
      if (normal.lengthSq() > 0.001) {
        normal.normalize();
        const offset = item.sizeMeters.depth * sceneScale / 2 + 0.004;
        target = new THREE.Vector3(hit.point.x + normal.x * offset, 0, hit.point.z + normal.z * offset);
        rotationY = Math.atan2(normal.x, normal.z);
        const wallTop = floorPlacementState.hasPhysicalScale ? PHYSICAL_WALL_HEIGHT : WALL_HEIGHT;
        baseY = Math.min(
          Math.max(hit.point.y - itemHeight / 2, 0.02),
          Math.max(0.02, wallTop - itemHeight - 0.02),
        );
        mode = "wall";
      }
    }
  }
  // Small items land on top of a table/storage piece when the cursor is over one.
  if (!target && itemIsStackable(item)) {
    const surfaceEntries = placedFurnitures.filter(
      entry => entryIsSurface(entry) && entry.placement.id !== excludeId,
    );
    const hit = furnitureRaycaster.intersectObjects(surfaceEntries.map(entry => entry.object), true)[0];
    if (hit) {
      const root = placedRootFromObject(hit.object);
      supportEntry = surfaceEntries.find(entry => entry.object === root) ?? null;
      if (supportEntry) {
        target = new THREE.Vector3(hit.point.x, 0, hit.point.z);
        // Rest on the support's actual rendered top, not its catalog height:
        // the model's true bounding-box top avoids the few-cm error and works
        // even if the cursor grazes a side face.
        furnitureSupportBounds.setFromObject(supportEntry.object);
        baseY = (furnitureSupportBounds.isEmpty()
          ? (supportEntry.placement.position[1] ?? 0) + supportEntry.item.sizeMeters.height * sceneScale
          : furnitureSupportBounds.max.y) + 0.004;
        mode = "surface";
      }
    }
  }
  if (!target) {
    target = furnitureRaycaster.ray.intersectPlane(furniturePlacementPlane, new THREE.Vector3());
    if (!target) return false;
  }

  pendingFurniture.object.position.set(target.x, baseY, target.z);
  if (mode === "wall") pendingFurniture.object.rotation.y = rotationY;
  pendingFurniture.mode = mode;
  pendingFurniture.supportEntry = supportEntry;
  const wasValid = pendingFurniture.valid;
  pendingFurniture.valid = pendingPlacementValidity();
  setPreviewAppearance(pendingFurniture.object, pendingFurniture.valid);
  if (wasValid !== pendingFurniture.valid) updateFurnitureInteractionUi();
  return true;
}

function pendingPlacementValidity() {
  const { item, object, mode, supportEntry, existingEntry } = pendingFurniture;
  const excludeId = existingEntry?.placement.id;
  const position = object.position;
  const rotationY = object.rotation.y;
  if (mode === "wall") {
    return !furnitureCollides(position, item, rotationY, position.y, excludeId);
  }
  if (mode === "surface") {
    return Boolean(supportEntry)
      && footprintWithinSupport(position, item, rotationY, supportEntry)
      && !furnitureCollides(position, item, rotationY, position.y, excludeId);
  }
  return furnitureFootprintFits(position, item, rotationY)
    && !furnitureCollides(position, item, rotationY, 0, excludeId);
}

function confirmFurniturePlacement() {
  if (!pendingFurniture?.object || !pendingFurniture.valid) {
    setStatus("이 위치에는 배치할 수 없습니다. 미리보기가 초록색일 때 ✓를 누르세요.", "warning");
    return;
  }
  const { item, object, existingEntry } = pendingFurniture;
  placementPreviewGroup.remove(object);
  restorePlacedAppearance(object);
  furnitureGroup.add(object);
  const placement = createFurniturePlacement(item, object.position, existingEntry?.placement.id);
  placement.rotationY = object.rotation.y;
  object.userData.placementId = placement.id;
  if (existingEntry) {
    existingEntry.object = object;
    existingEntry.placement = placement;
  } else {
    placedFurnitures.push({ item, object, placement });
  }
  selectedFurniture = object;
  pendingFurniture = null;
  updateFurnitureInteractionUi();
  setStatus(`${furnitureDisplayName(item)} 배치를 완료했습니다.`);
}

function placedRootFromObject(object) {
  let current = object;
  while (current && current.parent !== furnitureGroup) current = current.parent;
  return current?.parent === furnitureGroup ? current : null;
}

function selectFurnitureAt(event) {
  updateRayFromPointer(event);
  const hit = furnitureRaycaster.intersectObjects(furnitureGroup.children, true)[0];
  selectedFurniture = hit ? placedRootFromObject(hit.object) : null;
  updateFurnitureInteractionUi();
  if (selectedFurniture) setStatus("가구를 선택했습니다. 이동, 회전 또는 삭제할 수 있습니다.");
}

function beginMoveSelectedFurniture() {
  if (!selectedFurniture) return;
  const entry = placedFurnitures.find(
    candidate => candidate.placement.id === selectedFurniture.userData.placementId,
  );
  if (!entry) return;
  const originalTransform = {
    position: entry.object.position.clone(),
    quaternion: entry.object.quaternion.clone(),
  };
  furnitureGroup.remove(entry.object);
  setPreviewAppearance(entry.object, true);
  placementPreviewGroup.add(entry.object);
  pendingFurniture = {
    item: entry.item,
    object: entry.object,
    // The piece was standing at a legal spot, so it starts valid; the first
    // pointer move re-evaluates with the full wall/surface/floor logic.
    valid: true,
    existingEntry: entry,
    originalTransform,
    trackingPointer: true,
  };
  selectedFurniture = null;
  updateFurnitureInteractionUi();
  setStatus("가구를 옮길 위치를 클릭해 고정한 뒤 ✓를 누르세요. 취소하면 원래 위치로 돌아갑니다.");
}

function rotatePendingFurniture(direction) {
  if (!pendingFurniture?.object) return;
  const rotationDelta = direction * Math.PI / 2;
  pendingFurniture.object.rotation.y += rotationDelta;
  pendingFurniture.valid = pendingPlacementValidity();
  setPreviewAppearance(pendingFurniture.object, pendingFurniture.valid);
  updateFurnitureInteractionUi();
}

function rotateSelectedFurniture(direction) {
  if (!selectedFurniture) return;
  const entry = placedFurnitures.find(
    candidate => candidate.placement.id === selectedFurniture.userData.placementId,
  );
  if (!entry) return;
  const rotationDelta = direction * Math.PI / 2;
  selectedFurniture.rotation.y += rotationDelta;
  if (!furnitureFootprintFits(selectedFurniture.position, entry.item, selectedFurniture.rotation.y)) {
    selectedFurniture.rotation.y -= rotationDelta;
    setStatus("회전 후 가구가 실내 바닥을 벗어나므로 회전할 수 없습니다.", "warning");
    return;
  }
  entry.placement.rotationY = selectedFurniture.rotation.y;
  setStatus(direction < 0
    ? "가구를 왼쪽으로 90° 회전했습니다."
    : "가구를 오른쪽으로 90° 회전했습니다.");
}

function deleteSelectedFurniture() {
  if (!selectedFurniture) return;
  const id = selectedFurniture.userData.placementId;
  furnitureGroup.remove(selectedFurniture);
  disposeFurnitureMaterials(selectedFurniture);
  const index = placedFurnitures.findIndex(entry => entry.placement.id === id);
  if (index >= 0) placedFurnitures.splice(index, 1);
  selectedFurniture = null;
  updateFurnitureInteractionUi();
  setStatus("가구를 삭제했습니다.");
}

const currentFurniturePlacements = () => cloneFurniturePlacements(
  placedFurnitures.map(entry => entry.placement),
);

function summarize(data) {
  const w = data.polygons?.wall?.length ?? 0;
  const win = data.polygons?.window?.length ?? 0;
  const base = `${w} walls · ${win} windows`;
  const physicalScale = describePhysicalScale(data);
  return [base, physicalScale].filter(Boolean).join(" · ");
}

function describePhysicalScale(data) {
  const millimetersPerPixel = Number(data?.calibration?.millimetersPerPixel);
  if (!Number.isFinite(millimetersPerPixel) || millimetersPerPixel <= 0) return "";

  const bbox = polygonsBBox(data.polygons ?? {});
  const widthMeters = (bbox.maxX - bbox.minX) * millimetersPerPixel / 1000;
  const depthMeters = (bbox.maxY - bbox.minY) * millimetersPerPixel / 1000;
  if (!Number.isFinite(widthMeters) || !Number.isFinite(depthMeters)) return "";

  return `${widthMeters.toFixed(2)}m × ${depthMeters.toFixed(2)}m · 1px=${millimetersPerPixel.toFixed(2)}mm`;
}

function setStatus(message, tone = "") {
  status.textContent = message;
  status.className = tone;
}

function responseError(response, fallback) {
  return response.text().then(text => {
    try {
      return JSON.parse(text).detail || fallback;
    } catch {
      return text.slice(0, 160) || fallback;
    }
  });
}

function renderIcons() {
  window.lucide?.createIcons({ attrs: { "stroke-width": 1.8 } });
}

function openingCounts() {
  const openings = reviewEditor?.getOpenings() ?? [];
  return {
    wall: (currentComposedPlan ?? currentExtraction)?.polygons?.wall?.length ?? 0,
    door: openings.filter(item => item.kind === "door").length,
    window: openings.filter(item => item.kind === "window").length,
  };
}

function updateScaleControls() {
  const points = reviewEditor?.getScaleSelection() ?? [];
  const calibration = reviewEditor?.getCalibration();
  const hasTwoPoints = points.length === 2;
  const enteredLength = Number(scaleLength.value);

  scaleLength.disabled = !hasTwoPoints || inFlight;
  applyScaleButton.disabled = !hasTwoPoints || !Number.isFinite(enteredLength) || enteredLength <= 0 || inFlight;
  clearScaleButton.disabled = (!points.length && !calibration) || inFlight;

  if (calibration?.estimated) {
    scaleSummary.textContent = `${calibration.millimetersPerPixel.toFixed(2)} mm/px · auto-estimated from door width (${Math.round(calibration.actualMillimeters)} mm) · use Scale to refine`;
  } else if (calibration) {
    scaleSummary.textContent = `${calibration.millimetersPerPixel.toFixed(2)} mm/px · calibrated ${Math.round(calibration.actualMillimeters)} mm · grid follows real scale`;
  } else if (hasTwoPoints) {
    const pixels = Math.hypot(points[1].x - points[0].x, points[1].y - points[0].y);
    scaleSummary.textContent = `${pixels.toFixed(1)} px selected. Enter the real length.`;
  } else if (points.length === 1) {
    scaleSummary.textContent = "First point selected. Choose the second point.";
  } else {
    scaleSummary.textContent = "Choose Scale, then click two points.";
  }
}

function updateCameraPresetControls() {
  const showingThreeDimensional = ["3d", "furnishing"].includes(currentView);
  const hasRenderedPlan = Boolean(currentFraming && currentComposedPlan);
  cameraViewControls.hidden = !hasRenderedPlan || !showingThreeDimensional;
  cameraViewButtons.forEach(button => {
    button.disabled = !hasRenderedPlan || !showingThreeDimensional || inFlight;
  });
  updateCameraPresetButtons();
}

function updateEditorControls() {
  const reviewDocument = reviewEditor?.document;
  const hasDocument = Boolean(reviewDocument);
  const hasSelection = Boolean(reviewEditor?.selectedId);
  const counts = openingCounts();

  document.querySelectorAll("[data-count]").forEach(node => {
    node.textContent = counts[node.dataset.count] ?? 0;
  });
  toolButtons.forEach(button => { button.disabled = !hasDocument || inFlight; });

async function enterFurnishingStage() {
  const entering = currentView === "3d";
  let roomMaterialWarning = "";
  if (!currentComposedPlan || inFlight || (!entering && currentView !== "furnishing")) return;
  if (entering) {
    inFlight = true;
    updateEditorControls();
    setStatus("방별 바닥재를 만드는 중입니다.");
    try {
      await ensureRoomFloorMaterials();
    } catch (error) {
      rebuildFloorFinish(currentComposedPlan, floorFinishLayout);
      roomMaterialWarning = `방 분류를 적용하지 못해 기본 마루를 사용합니다: ${error.message}`;
      setStatus(roomMaterialWarning, "warning");
    } finally {
      inFlight = false;
    }
    currentView = "furnishing";
    setCanvasViewState("furnishing");
    setFurnishingVisibility(true);
    furniturePanel.hidden = false;
    structureButton.hidden = false;
    furnishButton.hidden = true;
    controls.enabled = true;
    controls.enableRotate = true;
    updateViewButtons("3d");
    updateEditorControls();
  }
  if (!furnitureCatalog.length || !furnitureCatalogPromise) {
    const loading = document.createElement("div");
    loading.className = "furniture-empty";
    loading.textContent = "가구 목록을 불러오는 중입니다.";
    furnitureResults.replaceChildren(loading);
    furniturePagination.hidden = true;
  }
  try {
    await ensureFurnitureCatalog();
    fillFurnitureCategories();
    catalogOffset = 0;
    renderFurnitureCatalog();
    if (roomMaterialWarning) {
      setStatus(roomMaterialWarning, "warning");
    } else {
      setStatus(`${furnitureCatalog.length}개 가구를 불러왔습니다. 항목을 눌러 배치하세요.`);
    }
  } catch (error) {
    renderFurnitureCatalogError(error);
    setStatus(`가구 목록 로딩 실패: ${error.message}`, "error");
  }
  updateFurnitureInteractionUi();
}

function leaveFurnishingStage() {
  if (currentView !== "furnishing") return;
  cancelFurnitureInteraction({ clearSelection: true, silent: true });
  currentView = "3d";
  setFurnishingVisibility(false);
  furniturePanel.hidden = true;
  structureButton.hidden = true;
  furnishButton.hidden = false;
  setCanvasViewState("3d");
  controls.enabled = true;
  controls.enableRotate = true;
  updateViewButtons("3d");
  assertViewState("3d");
  updateEditorControls();
}

controls.addEventListener("start", () => {

  furniturePointerStart = { x: event.clientX, y: event.clientY };
  furniturePointerMoved = false;
  suppressCanvasClick = false;
});
sceneCanvas.addEventListener("pointermove", event => {
  if (furniturePointerStart) {
    const distance = Math.hypot(
      event.clientX - furniturePointerStart.x,
      event.clientY - furniturePointerStart.y,
    );
    if (distance > 5 && controls.autoRotate) stopAutoOrbit();
    if (distance > 5) {
      furniturePointerMoved = true;
      if (orbitGestureActive) orbitGestureMoved = true;
      if (activeCameraView && activeCameraView !== "auto") {
        activeCameraView = null;
        updateCameraPresetButtons();
      }
    }
  }
  updateFurniturePreview(event);
});
sceneCanvas.addEventListener("pointerup", () => {
  suppressCanvasClick = suppressCanvasClick || furniturePointerMoved || orbitGestureMoved;
  furniturePointerStart = null;
});
sceneCanvas.addEventListener("pointercancel", () => {
  furniturePointerStart = null;
  furniturePointerMoved = false;
  orbitGestureMoved = false;
  suppressCanvasClick = false;
});

    furniturePointerMoved = false;
    orbitGestureMoved = false;
    return;

  if (pendingFurniture) {
    if (pendingFurniture.trackingPointer) {
      // 따라오는 중 → 클릭한 위치에 고정
      if (updateFurniturePreview(event, { force: true })) {
        pendingFurniture.trackingPointer = false;
        setStatus(
          pendingFurniture.valid
            ? "가구 위치를 고정했습니다. ✓로 완료하거나 다시 클릭하면 이동합니다."
            : "이 위치에는 배치할 수 없습니다. 다른 실내 위치를 클릭하세요.",

    deleteSelectedFurniture();

    const direction = event.shiftKey ? -1 : 1;
    if (pendingFurniture) rotatePendingFurniture(direction);
    else if (selectedFurniture) rotateSelectedFurniture(direction);
  }
});

function waitForViewTransition() {
  if (reducedMotionQuery.matches) return Promise.resolve();

  return new Promise(resolve => {
    let settled = false;
    const finish = () => {
      if (settled) return;
      settled = true;
      reviewCanvas.removeEventListener("transitionend", onTransitionEnd);
      window.clearTimeout(timeoutId);
      resolve();
    };
    const onTransitionEnd = event => {
      if (event.target === reviewCanvas && event.propertyName === "opacity") finish();
    };
    const timeoutId = window.setTimeout(finish, VIEW_FADE_MS + 80);
    reviewCanvas.addEventListener("transitionend", onTransitionEnd);
  });
}

async function transitionCanvasView(view) {
  if (currentView === view) {
    setView(view);
    return;
  }

  document.body.classList.add("view-transitioning");
  try {
    setView(view);
    await waitForViewTransition();
  } finally {
    document.body.classList.remove("view-transitioning");
  }
}

function assertViewState(view) {
  const showingReview = view === "original";
  const bodyStateMatches = document.body.classList.contains(
    showingReview ? "view-original" : "view-3d",
  );
  const toolsAvailable = editorTools.hidden === !reviewEditor?.document;
  if (!bodyStateMatches || !toolsAvailable || controls.enabled === showingReview) {
    throw new Error(`Controls state does not match ${view} view`);
  }
}

function updateViewButtons(view) {
  viewButtons.forEach(button => {
    const active = button.dataset.view === view;
    button.classList.toggle("active", active);
    button.setAttribute("aria-selected", String(active));
    button.tabIndex = active ? 0 : -1;
  });
}

function setView(view) {
  if (!["original", "3d", "furnishing"].includes(view)) {
    throw new RangeError(`Unknown plan view: ${view}`);
  }
  if (view === "furnishing") {
    enterFurnishingStage();
    return;
  }
  if (view === "original" && !reviewEditor?.document) return;

  if (currentView === "furnishing") {
    cancelFurnitureInteraction({ clearSelection: true, silent: true });
    setFurnishingVisibility(false);
    furniturePanel.hidden = true;
    structureButton.hidden = true;
  }

  const showingReview = view === "original";
  const viewChanged = currentView !== view;
  if (showingReview) {
    cameraPresetTransitionActive = false;
    stopAutoOrbit();
  }
  currentView = view;
  editorTools.hidden = !reviewEditor?.document;
  setCanvasViewState(view);
  controls.enabled = !showingReview;
  controls.enableRotate = !showingReview;
  updateViewButtons(view);

  if (viewChanged && !showingReview) {
    const reducedMotion = reducedMotionQuery.matches;
    setPlanGeometryVisible(true);
    if (currentFraming) {
      const { center, radius } = currentFraming;
      activeCameraView = "perspective";
      updateCameraPresetButtons();
      moveCameraImmediately(overheadPosition(center, radius), center);
      if (reducedMotion) {
        moveCameraImmediately(perspectivePosition(center, radius), center);
      } else {
        void tweenCamera(perspectivePosition(center, radius), center, CAMERA_TWEEN_MS);
      }
    }
    replayRiseAnimations(animations, performance.now(), reducedMotion);
  }

  if (showingReview) {
    requestAnimationFrame(() => {
      reviewEditor.resize();
      reviewEditor.render();
    });
  }
  assertViewState(view);
  updateEditorControls();
}

async function showOriginalView() {
  if (currentView === "original" || inFlight || !reviewEditor?.document) return;
  cameraPresetTransitionId += 1;
  cameraPresetTransitionActive = false;
  stopAutoOrbit();
  if (!currentFraming) {
    await transitionCanvasView("original");
    return;
  }

  inFlight = true;
  updateViewButtons("original");
  updateEditorControls();
  controls.enabled = false;
  controls.enableRotate = false;
  setPlanGeometryVisible(false);

  try {
    const { center, radius } = currentFraming;
    if (reducedMotionQuery.matches) {
      moveCameraImmediately(overheadPosition(center, radius), center);
    } else {
      await tweenCamera(overheadPosition(center, radius), center, CAMERA_TWEEN_MS);
    }
    await transitionCanvasView("original");
  } finally {
    inFlight = false;
    updateEditorControls();
  }
}

function syncCorrectedOpenings(correctedOpenings) {
  if (!reviewEditor?.document || !Array.isArray(correctedOpenings)) return;
  const correctedById = new Map(correctedOpenings.map(item => [item.id, item]));
  reviewEditor.document.openings = reviewEditor.document.openings.map(item => (
    correctedById.has(item.id) ? { ...item, ...correctedById.get(item.id) } : item
  ));
  reviewEditor.render();
}

async function extractReviewFile(file) {
  setStatus("Extracting…");

  const form = new FormData();
  form.append("image", file);
  const response = await fetch("/extract-image", { method: "POST", body: form });
  if (!response.ok) throw new Error(await responseError(response, `Extraction failed (${response.status})`));
  const data = await response.json();
  const reviewData = {
    ...data,
    openings: data.openings ?? [],
  };
  await reviewEditor.load(reviewData);
  reviewEditor.setTool("select");
  scaleLength.value = "";
  toolButtons.forEach(button => button.classList.toggle("active", button.dataset.tool === "select"));
  currentExtraction = reviewData;
  currentComposedPlan = null;
  currentSourceName = file.name;
  clearPlan();
  setView("original");

  const warning = reviewData.opening_detection?.warning;
  const base = [
    `${reviewEditor.getOpenings().length} openings ready`,
    warning,
  ].filter(Boolean).join(" · ");
  setStatus(base, warning ? "warning" : "");
  return reviewData;
}

async function extractForReview(file) {
  if (inFlight || !reviewEditor) return false;
  inFlight = true;
  updateEditorControls();

  try {
    await extractReviewFile(file);
    document.body.classList.remove("upload-empty");
    return true;
  } catch (error) {
    setStatus(`Extraction failed: ${error.message}`, "error");
    return false;
  } finally {
    inFlight = false;
    updateEditorControls();
  }
}

async function showThreeDimensionalView() {
  if (currentView === "furnishing") {
    leaveFurnishingStage();
    return;
  }
  const reviewDocument = reviewEditor?.document;
  if (!reviewDocument || inFlight) return;

  inFlight = true;
  updateEditorControls();
  try {
    if (reviewDocument.needsCompose()) {
      const requestedRevision = reviewDocument.revision;
      setStatus("Composing 3D…");
      const form = new FormData();
      form.append("wall_mask", await reviewEditor.toWallMaskBlob(), "wall-mask.png");
      form.append("openings", JSON.stringify(reviewEditor.getOpenings()));
      const response = await fetch("/compose-edits", { method: "POST", body: form });
      if (!response.ok) throw new Error(await responseError(response, `Composition failed (${response.status})`));
      const composed = await response.json();
      if (reviewEditor.document !== reviewDocument || reviewDocument.revision !== requestedRevision) {
        throw new Error("The review changed during composition. Try again.");
      }

      const calibratedComposed = {
        ...composed,
        input_image_b64: currentExtraction?.input_image_b64,
        analysis_image_b64: currentExtraction?.analysis_image_b64,
        calibration: reviewEditor.getCalibration(),
      };
      const rendered = await loadPlan(calibratedComposed);
      if (!rendered) throw new Error("No renderable polygons were found. Adjust the wall mask and retry.");
      currentComposedPlan = calibratedComposed;
      syncCorrectedOpenings(composed.openings);
      reviewDocument.markRendered();
    } else if (!currentComposedPlan) {
      throw new Error("No composed 3D view is cached for this review.");
    }

    await transitionCanvasView("3d");
    setStatus(summarize(currentComposedPlan));
  } catch (error) {
    setView("original");
    setStatus(
      `Composition failed: ${error.message}. Review preserved; choose Show 3D to retry.`,
      "error",
    );
  } finally {
    inFlight = false;
    updateEditorControls();
  }
}

// Retained for static demo JSON callers; editable fields are not required.
async function fetchAndLoad(url, init) {
  if (inFlight) return false;
  inFlight = true;
  setStatus("Loading…");
  try {
    const res = await fetch(url, init);
    if (!res.ok) {
      setStatus(`Error ${res.status}: ${await responseError(res, "Could not load plan")}`, "error");
      return false;
    }
    const data = await res.json();
    const rendered = await loadPlan(data);
    if (!rendered) {
      setStatus("This sample has no renderable polygons. Choose another sample to retry.", "error");
      return false;
    }
    currentComposedPlan = data;
    setStatus(summarize(data));
    return true;
  } catch (e) {
    setStatus("Failed: " + e.message, "error");
    return false;
  } finally {
    inFlight = false;
    updateEditorControls();
  }
}

// Live upload only works when the FastAPI server is reachable. Probe
// /healthz once at startup; if it answers, reveal the upload UI and wire
// drag-and-drop. On the static deploy this 404s and the upload UI stays
// hidden — visitors still get the pre-rendered samples.
async function enableLiveMode() {
  // Cloudflare Pages serves index.html as a fallback for unknown paths,
  // so a plain `res.ok` check would be true even with no backend. Require
  // a real JSON body matching the FastAPI healthz contract.
  try {
    const res = await fetch("/healthz", { cache: "no-store" });
    if (!res.ok) return false;
    if (!res.headers.get("content-type")?.includes("application/json")) return false;
    const body = await res.json();
    if (!body || body.ok !== true) return false;
  } catch { return false; }

  try {
    const { ReviewEditor } = await import("/viewer-assets/review-editor.mjs");
    reviewEditor = new ReviewEditor(reviewCanvas, { onChange: updateEditorControls });
  } catch (error) {
    setStatus(`Editor unavailable: ${error.message}`, "error");
    return true;
  }

  wireReviewControls();
  viewControls.hidden = false;
  document.getElementById("upload-label").hidden = false;
  uploadButton.hidden = false;
  renderIcons();
  updateEditorControls();
  const fileInput = document.getElementById("file-input");
  uploadButton.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", () => {
    if (!fileInput.files.length) return;
    extractForReview(fileInput.files[0]);
    fileInput.value = "";
  });

  let dragDepth = 0;
  window.addEventListener("dragenter", e => { e.preventDefault(); dragDepth++; document.body.classList.add("dragging"); });
  window.addEventListener("dragleave", e => { e.preventDefault(); dragDepth--; if (dragDepth <= 0) document.body.classList.remove("dragging"); });
  window.addEventListener("dragover",  e => { e.preventDefault(); });
  window.addEventListener("drop", e => {
    e.preventDefault(); dragDepth = 0; document.body.classList.remove("dragging");
    const file = e.dataTransfer?.files?.[0];
    if (!file || !file.type.startsWith("image/")) return;
    extractForReview(file);
  });
  return true;
}

    }
    const manifest = await response.json();
    if (!Array.isArray(manifest.samples) || manifest.samples.length === 0) {
      throw new Error("Sample manifest is empty");
    }

    demoSelect.replaceChildren();
    for (const sample of manifest.samples) {
      const option = document.createElement("option");
      option.value = sample.key;
      option.textContent = `Sample ${sample.key} · ${sample.walls} walls · ${sample.doors + sample.windows} openings`;
      demoSelect.append(option);
    }
    demoSelect.addEventListener("change", () => {
      fetchAndLoad(`./demos/${encodeURIComponent(demoSelect.value)}.json`);
    });
    await fetchAndLoad(`./demos/${encodeURIComponent(demoSelect.value)}.json`);
  } catch (error) {
    setStatus(`Static samples unavailable: ${error.message}. Reload to retry.`, "error");
  }
}

async function initializeViewer() {
  const liveModeEnabled = await enableLiveMode();
  if (liveModeEnabled) {
    await initializeRoomLogIntegration();
  } else {
    await enableStaticDemoMode();
  }
}
window.addEventListener("load", renderIcons);
initializeViewer();
</script>
</body>
</html>
