services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_NAVER_MAP_CLIENT_ID: ${NEXT_PUBLIC_NAVER_MAP_CLIENT_ID:-}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
        NEXT_PUBLIC_TOSS_CLIENT_KEY: ${NEXT_PUBLIC_TOSS_CLIENT_KEY:-}
        NEXT_PUBLIC_FURNITURE_ASSET_BASE_URL: ${NEXT_PUBLIC_FURNITURE_ASSET_BASE_URL:-}
    container_name: roomlog-web
    restart: unless-stopped
    env_file:
      - path: .env.local
        required: false
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
      NEXT_PUBLIC_TOSS_CLIENT_KEY: ${NEXT_PUBLIC_TOSS_CLIENT_KEY:-}
      NEXT_PUBLIC_FURNITURE_ASSET_BASE_URL: ${NEXT_PUBLIC_FURNITURE_ASSET_BASE_URL:-}
      # Host paths in .env.local cannot resolve inside the container; use the mount points.
      MITUNET_PROJECT_ROOT: /mitunet
      FURNITURE_DATASET_ROOT: /furniture
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ${MITUNET_HOST_PROJECT_ROOT:-./services/mitunet}:/mitunet:ro
      - ${FURNITURE_HOST_DATASET_ROOT:-./runtime-assets/furniture-glb-dataset}:/furniture:ro

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: roomlog-api:${ROOMLOG_API_IMAGE_TAG:-local}
    container_name: roomlog-api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://roomlog:roomlog@postgres:5432/roomlog_migrated?schema=public}
      ROOMLOG_STORE_FILE: ${ROOMLOG_STORE_FILE:-/data/roomlog-store.json}
      LOCAL_UPLOAD_DIR: ${LOCAL_UPLOAD_DIR:-/data/uploads}
      PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-http://localhost:4000/api/files}
      # 로컬 Compose 전용 기본값. 배포는 PROD_ENV의 별도 시크릿을 사용한다.
      VENDOR_ACTIVATION_KEY_PEPPER: ${VENDOR_ACTIVATION_KEY_PEPPER:-roomlog-local-vendor-activation-pepper}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-roomlog-files}
      # 임차인 가구 USDZ→GLB 변환 워커(services/mesh-worker). S3_UPLOADS_ENABLED가 꺼져 있으면(로컬
      # 기본값) GLB 업로드용 presign을 발급할 수 없어 큐잉 자체가 즉시 FAILED로 떨어진다 — 로컬에서
      # 끝까지 확인하려면 S3_UPLOADS_ENABLED=true 등 S3 값도 함께 채워야 한다(docs/mesh-conversion-worker.md).
      MESH_WORKER_URL: ${MESH_WORKER_URL:-http://mesh-worker:5001}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://api:4000}
      GPU_WORKER_SECRET: ${GPU_WORKER_SECRET:-roomlog-local-worker-secret}
    ports:
      - "4000:4000"
    volumes:
      - roomlog-api-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

  mesh-worker:
    build:
      context: .
      dockerfile: services/mesh-worker/Dockerfile
    container_name: roomlog-mesh-worker
    restart: unless-stopped
    environment:
      PORT: "5001"
      GPU_WORKER_SECRET: ${GPU_WORKER_SECRET:-roomlog-local-worker-secret}
    ports:
      - "5001:5001"

  migration:
    image: roomlog-api:${ROOMLOG_API_IMAGE_TAG:-local}
    restart: "no"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://roomlog:roomlog@postgres:5432/roomlog_migrated?schema=public}
      ROOMLOG_MIGRATION_CREATE_DATABASE: "true"
    command: ["node", "apps/api/scripts/migrate-database.mjs"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.3-alpine
    container_name: roomlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roomlog}
      POSTGRES_USER: ${POSTGRES_USER:-roomlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomlog}
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB:-roomlog_test}
    ports:
      - "5433:5432"
    volumes:
      - roomlog-postgres-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  roomlog-api-data:
  roomlog-postgres-data:
