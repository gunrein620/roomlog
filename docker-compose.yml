services:
  nginx:
    image: nginx:1.27-alpine
    container_name: roomlog-nginx
    depends_on:
      - tenant
      - manager
      - vendor
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  tenant:
    build:
      context: .
      dockerfile: apps/tenant/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_BASE_PATH: /tenant
    container_name: roomlog-tenant
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_BASE_PATH: /tenant
    depends_on:
      - api
    ports:
      - "3001:3001"

  manager:
    build:
      context: .
      dockerfile: apps/manager/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_BASE_PATH: /manager
    container_name: roomlog-manager
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_BASE_PATH: /manager
    depends_on:
      - api
    ports:
      - "3002:3002"

  vendor:
    build:
      context: .
      dockerfile: apps/vendor/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_BASE_PATH: /vendor
    container_name: roomlog-vendor
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_BASE_PATH: /vendor
    depends_on:
      - api
    ports:
      - "3003:3003"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: roomlog-api
    environment:
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-roomlog-files}
    ports:
      - "4000:4000"
