services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: roomlog-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    depends_on:
      - api
    ports:
      - "3000:3000"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: roomlog-api
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://roomlog:roomlog@postgres:5432/roomlog?schema=public}
      ROOMLOG_STORE_FILE: ${ROOMLOG_STORE_FILE:-/data/roomlog-store.json}
      LOCAL_UPLOAD_DIR: ${LOCAL_UPLOAD_DIR:-/data/uploads}
      PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-http://localhost:4000/api/files}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-roomlog-files}
    ports:
      - "4000:4000"
    volumes:
      - roomlog-api-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.3-alpine
    container_name: roomlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roomlog}
      POSTGRES_USER: ${POSTGRES_USER:-roomlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomlog}
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB:-roomlog_test}
    ports:
      - "5433:5432"
    volumes:
      - roomlog-postgres-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  roomlog-api-data:
  roomlog-postgres-data:
